<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Gestión</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --bg-main: #121212;
            --bg-card: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-blue-mate: #4682B4; 
            --accent-blue-hover: #5492C4;
            --input-bg: #2A2A2A;
            --input-border: #3E3E3E;
            --radius-custom: 10px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: var(--bg-main); 
            margin: 0; 
            color: var(--text-primary);
        }

        .box { 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            text-align: center; 
            width: 90%; 
            max-width: 450px; 
            min-height: 500px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.03em; }
        p { color: var(--text-secondary); margin-bottom: 30px; font-size: 1rem; }

        input { 
            width: 100%; padding: 20px; font-size: 1rem; 
            border: 2px solid var(--input-border); border-radius: var(--radius-custom); 
            box-sizing: border-box; text-align: center; color: var(--text-primary); 
            background: var(--input-bg); margin-bottom: 15px; font-weight: 600;
        }

        /* Corregir color blanco de auto-relleno */
        input:-webkit-autofill {
            -webkit-text-fill-color: white !important;
            -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset !important;
        }

        button { 
            width: 100%; padding: 20px; font-size: 1rem; 
            background: var(--accent-blue-mate); color: white; border: none; 
            border-radius: var(--radius-custom); cursor: pointer; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.12em; transition: all 0.3s ease;
        }

        /* DISEÑO DE LA LISTA */
        #lista-pacientes { margin-top: 10px; }

        .paciente-item {
            padding: 20px;
            border-radius: var(--radius-custom);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--input-border);
            margin-bottom: 15px;
            text-align: center;
        }

        /* Estilo sutil para pacientes ya atendidos */
        .estado-atendido { opacity: 0.5; border-color: transparent; background: rgba(255,255,255,0.01); }

        .paciente-nombre { font-weight: 800; font-size: 1.3rem; display: block; margin-bottom: 5px; color: var(--text-primary); }
        .paciente-info { color: var(--text-secondary); font-size: 0.85rem; display: block; margin-bottom: 15px; }

        .btn-atendiendo { background: #1DB954; }
        .btn-finalizar { background: #555; }
        .status-badge { color: #1DB954; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; border: 1px solid #1DB954; padding: 5px 10px; border-radius: 5px; display: inline-block; }

        .btn-logout { background: transparent; color: #444; border: none; font-size: 0.8rem; margin-top: auto; padding-top: 20px; text-decoration: underline; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div id="login-section">
            <h1>Ingreso Médico</h1>
            <p>Acceda a su panel de gestión</p>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button id="btnLogin">INGRESAR</button>
        </div>

        <div id="doctor-section" class="hidden">
            <h1>Agenda Médica</h1>
            <p id="doc-email" style="font-size: 0.8rem; opacity: 0.5; margin-top: -20px; margin-bottom: 20px;"></p>
            <div id="lista-pacientes"></div>
            <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error de acceso"));
        });

        window.cerrarSesion = () => signOut(auth);

        window.cambiarEstado = async (id, nuevoEstado, nombre = null, box = null) => {
            await updateDoc(doc(db, "agendados", id), { estado: nuevoEstado });
            if (nuevoEstado === 'llamando') {
                await updateDoc(doc(db, "turnos", "actual"), { paciente: nombre, box: box });
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('doctor-section').classList.remove('hidden');
                document.getElementById('doc-email').innerText = user.email;

                // CONSULTA SIMPLE: Sin filtros de estado para que no falle nunca
                const q = query(collection(db, "agendados"), where("doctor_id", "==", user.email));
                
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('lista-pacientes');
                    container.innerHTML = "";
                    
                    snapshot.forEach((docSnap) => {
                        const p = docSnap.data();
                        const id = docSnap.id;
                        const estado = p.estado || 'llegado';
                        
                        const item = document.createElement('div');
                        item.className = `paciente-item ${estado === 'atendido' ? 'estado-atendido' : ''}`;
                        
                        let controles = '';
                        if (estado === 'llegado') {
                            controles = `<button onclick="cambiarEstado('${id}', 'llamando', '${p.nombre}', '${p.piso} ${p.consulta}')">LLAMAR</button>`;
                        } else if (estado === 'llamando') {
                            controles = `<button class="btn-atendiendo" onclick="cambiarEstado('${id}', 'atendiendo')">ATENDIENDO</button>`;
                        } else if (estado === 'atendiendo') {
                            controles = `<button class="btn-finalizar" onclick="cambiarEstado('${id}', 'atendido')">FINALIZAR</button>`;
                        } else {
                            controles = `<span class="status-badge">Atendido ✓</span>`;
                        }

                        item.innerHTML = `
                            <span class="paciente-nombre">${p.nombre}</span>
                            <span class="paciente-info">RUT: ${p.rut}</span>
                            ${controles}
                        `;
                        container.appendChild(item);
                    });
                });
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('doctor-section').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
