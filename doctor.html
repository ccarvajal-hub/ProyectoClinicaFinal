<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Médica - Panel Doctor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --blue-accent: #4682B4; 
            --green-accent: #1DB954;
            --orange-accent: #f59e0b;
            --border-color: #333333;
            --radius-box: 24px;
            --radius-card: 16px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CAJA PRINCIPAL (Igual al estilo Kiosko de tus fotos) */
        .box {
            background-color: var(--bg-card);
            padding: 45px 35px;
            border-radius: var(--radius-box);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        h1 { 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -1.5px; 
        }

        .user-email { 
            color: var(--text-muted); 
            font-size: 0.9rem; 
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* CONTENEDOR DE LA LISTA */
        #agenda-lista { 
            text-align: left; 
        }

        /* FILA DE PACIENTE */
        .paciente-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .col-nombre strong { 
            display: block; 
            font-size: 1.1rem; 
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .col-info { 
            color: var(--text-muted); 
            font-size: 0.7rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* BOTONES Y ACCIONES */
        .col-accion { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            gap: 8px; 
        }

        button {
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-call { background-color: var(--blue-accent); color: white; padding: 10px 20px; font-size: 0.8rem; }
        .btn-wait { background-color: var(--orange-accent); color: white; padding: 10px 20px; font-size: 0.8rem; }
        .btn-done { background-color: var(--green-accent); color: white; padding: 10px 20px; font-size: 0.8rem; }
        
        .tag-atendido { 
            color: var(--green-accent); 
            font-size: 0.7rem; 
            font-weight: 800;
            padding: 8px;
        }

        /* MINI BOTONES (Deshacer y Borrar) */
        .mini-group { display: flex; gap: 5px; }
        .btn-mini { 
            background: #252525; 
            color: #777; 
            width: 32px; 
            height: 32px; 
            border-radius: 8px; 
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-mini:hover { background: #333; color: white; }
        .btn-danger-text:hover { color: #ff5555; }

        .btn-logout {
            margin-top: 30px;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: underline;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FUNCIONES DE TU CÓDIGO ORIGINAL
        window.cambiarEstado = async (id, nuevoEstado, nombre = null, box = null) => {
            await updateDoc(doc(db, "agendados", id), { estado: nuevoEstado });
            if (nuevoEstado === 'llamando') {
                await updateDoc(doc(db, "turnos", "actual"), { paciente: nombre, box: box });
            }
        };

        window.cancelar = async (id, nombre) => {
            if (confirm("¿Eliminar cita de " + nombre + "?")) await deleteDoc(doc(db, "agendados", id));
        };

        window.cerrarSesion = () => signOut(auth).then(() => location.href = "login.html");

        document.addEventListener('DOMContentLoaded', () => {
            onAuthStateChanged(auth, (user) => {
                if (!user) { window.location.href = "login.html"; return; }
                document.getElementById('email-display').innerText = user.email;
                
                const q = query(collection(db, "agendados"), where("doctor_id", "==", user.email));
                
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('agenda-lista');
                    container.innerHTML = "";
                    
                    snapshot.forEach((docSnap) => {
                        const p = docSnap.data();
                        const id = docSnap.id;
                        const estado = p.estado || 'llegado';
                        
                        container.innerHTML += `
                            <div class="paciente-card">
                                <div class="col-nombre">
                                    <strong>${p.nombre}</strong>
                                    <div class="col-info">${estado}</div>
                                </div>
                                <div class="col-accion">
                                    ${estado === 'llegado' ? `<button class="btn-call" onclick="cambiarEstado('${id}', 'llamando', '${p.nombre}', '${p.piso} ${p.consulta}')">LLAMAR</button>` : ''}
                                    ${estado === 'llamando' ? `<button class="btn-wait" onclick="cambiarEstado('${id}', 'atendiendo')">ATENDIENDO</button>` : ''}
                                    ${estado === 'atendiendo' ? `<button class="btn-done" onclick="cambiarEstado('${id}', 'atendido')">FINALIZAR</button>` : ''}
                                    ${estado === 'atendido' ? `<span class="tag-atendido">ATENDIDO ✓</span>` : ''}
                                    
                                    <div class="mini-group">
                                        ${estado !== 'llegado' ? `<button class="btn-mini" onclick="cambiarEstado('${id}', 'llegado')">↺</button>` : ''}
                                        <button class="btn-mini btn-danger-text" onclick="cancelar('${id}', '${p.nombre}')">✕</button>
                                    </div>
                                </div>
                            </div>`;
                    });
                });
            });
        });
    </script>
</head>
<body>
    <div class="box">
        <h1>Agenda</h1>
        <div class="user-email" id="email-display">Cargando...</div>
        <div id="agenda-lista"></div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</body>
</html>
