<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Doctor - Agenda Médica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #4a4a4a;
            --bg-card: #1c1c1c;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --color-recepcion: #FFB347;
            --color-llamado: #4299E1;
            --color-atendido: #48BB78;
            --color-pendiente: #CFCFCF;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 1200px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-align: center;
        }

        .user-name {
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-align: center;
            display: block;
            opacity: 0.9;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-espera { color: var(--color-llamado); }
        .title-historial { color: var(--color-atendido); }

        .header, .row {
            display: flex;
            align-items: center;
            padding: 12px 20px;
        }

        .header {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .col-name { flex: 2; }
        .col-rut { flex: 1.2; text-align: center; }
        .col-info { flex: 1.2; text-align: center; }
        .col-hora { flex: 0.8; text-align: center; }
        .col-llegada { flex: 0.8; text-align: center; }
        .col-est { flex: 1; text-align: center; }
        .col-acts { flex: 1.5; text-align: right; }

        .row {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .name-txt {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .rut-txt {
            color: var(--text-muted);
            font-weight: 600;
        }

        .info-txt {
            color: #fdfd96;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .llegada-txt {
            color: var(--color-recepcion);
            font-weight: 700;
        }

        .st-txt {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .st-pendiente { color: var(--color-pendiente); }
        .st-en_recepcion { color: var(--color-recepcion); }
        .st-llamado { color: var(--color-llamado); }
        .st-atendido { color: var(--color-atendido); }

        button {
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: white;
            transition: 0.2s;
        }

        .btn-call { background: var(--color-llamado); }
        .btn-fin { background: var(--color-atendido); }
        .btn-del {
            background: transparent;
            color: #FC8181;
            font-size: 1.1rem;
            margin-left: 10px;
            font-weight: 400;
        }

        .btn-logout {
            background: #d4d4a1;
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #333;
            font-weight: 800;
            border-radius: 8px;
        }

        .empty {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <h1>AGENDA MÉDICA</h1>
    <div class="user-name" id="display-name">Cargando...</div>

    <div class="container">
        <h2 class="title-espera">● PACIENTES POR ATENDER</h2>
        <div class="header">
            <div class="col-name">Paciente</div>
            <div class="col-rut">RUT</div>
            <div class="col-info">Ubicación</div>
            <div class="col-hora">Cita</div>
            <div class="col-llegada">Llegada</div>
            <div class="col-est">Estado</div>
            <div class="col-acts">Acción</div>
        </div>
        <div id="lista-espera"></div>
    </div>

    <div class="container" style="opacity: 0.85;">
        <h2 class="title-historial">✔ HISTORIAL DE HOY</h2>
        <div id="lista-historial"></div>
    </div>

    <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let nombreDoc = "";
        let boxDoc = "";

        function formatRut(rut) {
            if (!rut) return "---";
            const value = rut.toString().replace(/\./g, '').replace('-', '');
            if (value.length < 2) return value;
            const cuerpo = value.slice(0, -1);
            const dv = value.slice(-1).toUpperCase();
            return cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + dv;
        }

        function obtenerFechaHoyChile() {
            const partes = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Santiago',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).formatToParts(new Date());

            const year = partes.find(p => p.type === 'year').value;
            const month = partes.find(p => p.type === 'month').value;
            const day = partes.find(p => p.type === 'day').value;

            return `${year}-${month}-${day}`;
        }

        function estadoReal(estado) {
            return (estado || 'pendiente').toLowerCase().trim();
        }

        function estadoVisualDesdeReal(estado) {
            const e = estadoReal(estado);

            if (e === 'llegado' || e === 'pagado' || e === 'en_recepcion' || e === 'en recepción') {
                return 'en_recepcion';
            }

            if (e === 'llamando' || e === 'llamado' || e === 'atendiendo') {
                return 'llamado';
            }

            if (e === 'atendido') {
                return 'atendido';
            }

            return 'pendiente';
        }

        function textoEstadoDesdeReal(estado) {
            const visual = estadoVisualDesdeReal(estado);

            if (visual === 'en_recepcion') return 'En Recepción';
            if (visual === 'llamado') return 'Llamado';
            if (visual === 'atendido') return 'Atendido';
            return 'Pendiente';
        }

        function horaATotalMinutos(hora) {
            if (!hora || typeof hora !== 'string') return 999999;

            const [hh, mm] = hora.split(':').map(Number);

            if (Number.isNaN(hh) || Number.isNaN(mm)) return 999999;

            return (hh * 60) + mm;
        }

        window.cambiarEstado = async (id, nuevo, nombre = "") => {
            try {
                const updateData = { estado: nuevo };

                if (nuevo === 'llamando') {
                    const ahora = new Date().getTime();
                    updateData.ultimo_llamado = ahora;

                    const horaActual = new Date().toLocaleTimeString('es-CL', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });

                    await updateDoc(doc(db, "turnos", "actual"), {
                        paciente: nombre,
                        box: boxDoc,
                        doctor: nombreDoc,
                        hora_llamado: horaActual
                    });
                }

                await updateDoc(doc(db, "agendados", id), updateData);
            } catch (e) {
                console.error("Error al cambiar estado:", e);
            }
        };

        window.confirmarLlamado = async (id, nombre) => {
            const ok = confirm(`¿Llamar ahora a ${nombre}?`);
            if (!ok) return;
            await window.cambiarEstado(id, 'llamando', nombre);
        };

        window.eliminar = async (id, nombre) => {
            if (confirm(`¿Eliminar a ${nombre}?`)) {
                await deleteDoc(doc(db, "agendados", id));
            }
        };

        document.getElementById('btnLogout').onclick = () => {
            signOut(auth).then(() => location.href = "login.html");
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                location.href = "login.html";
                return;
            }

            const emailNormalizado = user.email.toLowerCase().trim();
            const fechaHoy = obtenerFechaHoyChile();

            const dSnap = await getDoc(doc(db, "doctores", emailNormalizado));
            if (dSnap.exists()) {
                const data = dSnap.data();
                nombreDoc = data.nombre || "";
                boxDoc = `PISO ${data.piso} - CONSULTA ${data.consulta}`;
                document.getElementById('display-name').innerText = `DR. ${nombreDoc}`;
            } else {
                document.getElementById('display-name').innerText = emailNormalizado;
            }

            const q = query(
                collection(db, "agendados"),
                where("doctor_id", "==", emailNormalizado),
                where("fecha_turno", "==", fechaHoy)
            );

            onSnapshot(q, (snapshot) => {
                const esperaDiv = document.getElementById('lista-espera');
                const historialDiv = document.getElementById('lista-historial');

                esperaDiv.innerHTML = "";
                historialDiv.innerHTML = "";

                const pacientes = snapshot.docs.map(docSnap => {
                    const p = docSnap.data();
                    return {
                        id: docSnap.id,
                        ...p
                    };
                });

                const espera = pacientes
                    .filter(p => estadoReal(p.estado) !== 'atendido')
                    .sort((a, b) => {
                        const ordenEstados = {
                            pagado: 0,
                            llamando: 1,
                            llamado: 1,
                            atendiendo: 1,
                            llegado: 2,
                            en_recepcion: 2,
                            pendiente: 3
                        };

                        const ordenA = ordenEstados[estadoReal(a.estado)] ?? 99;
                        const ordenB = ordenEstados[estadoReal(b.estado)] ?? 99;

                        if (ordenA !== ordenB) return ordenA - ordenB;

                        return horaATotalMinutos(a.hora_consulta) - horaATotalMinutos(b.hora_consulta);
                    });

                const historial = pacientes
                    .filter(p => estadoReal(p.estado) === 'atendido')
                    .sort((a, b) => horaATotalMinutos(a.hora_consulta) - horaATotalMinutos(b.hora_consulta));

                espera.forEach(p => {
                    const row = document.createElement('div');
                    row.className = "row";

                    const estadoDb = estadoReal(p.estado);
                    const estadoVisual = estadoVisualDesdeReal(p.estado);
                    const nombreSeguro = (p.nombre || '').replace(/'/g, "\\'");

                    let botones = "";

                    if (estadoDb === 'pagado') {
                        botones = `<button class="btn-call" onclick="confirmarLlamado('${p.id}','${nombreSeguro}')">Llamar</button>`;
                    } else if (estadoDb === 'llamando' || estadoDb === 'llamado' || estadoDb === 'atendiendo') {
                        botones = `<button class="btn-fin" onclick="cambiarEstado('${p.id}','atendido')">Finalizar</button>`;
                    }

                    row.innerHTML = `
                        <div class="col-name name-txt">${p.nombre || ''}</div>
                        <div class="col-rut rut-txt">${formatRut(p.rut)}</div>
                        <div class="col-info info-txt">${boxDoc}</div>
                        <div class="col-hora">${p.hora_consulta || '--:--'}</div>
                        <div class="col-llegada llegada-txt">${p.hora_llegada || '--:--'}</div>
                        <div class="col-est st-txt st-${estadoVisual}">${textoEstadoDesdeReal(p.estado)}</div>
                        <div class="col-acts">
                            ${botones}
                            <button class="btn-del" onclick="eliminar('${p.id}','${nombreSeguro}')">✕</button>
                        </div>
                    `;

                    esperaDiv.appendChild(row);
                });

                historial.forEach(p => {
                    const row = document.createElement('div');
                    row.className = "row";

                    const estadoVisual = estadoVisualDesdeReal(p.estado);
                    const nombreSeguro = (p.nombre || '').replace(/'/g, "\\'");

                    row.innerHTML = `
                        <div class="col-name name-txt">${p.nombre || ''}</div>
                        <div class="col-rut rut-txt">${formatRut(p.rut)}</div>
                        <div class="col-info info-txt">${boxDoc}</div>
                        <div class="col-hora">${p.hora_consulta || '--:--'}</div>
                        <div class="col-llegada llegada-txt">${p.hora_llegada || '--:--'}</div>
                        <div class="col-est st-txt st-${estadoVisual}">${textoEstadoDesdeReal(p.estado)}</div>
                        <div class="col-acts">
                            <button class="btn-del" onclick="eliminar('${p.id}','${nombreSeguro}')">✕</button>
                        </div>
                    `;

                    historialDiv.appendChild(row);
                });

                if (espera.length === 0) {
                    esperaDiv.innerHTML = '<div class="empty">No hay pacientes en espera hoy.</div>';
                }

                if (historial.length === 0) {
                    historialDiv.innerHTML = '<div class="empty">No hay historial hoy.</div>';
                }
            }, (error) => {
                console.error("Error al escuchar agenda del doctor:", error);
                document.getElementById('lista-espera').innerHTML = '<div class="empty">Error al cargar la agenda.</div>';
                document.getElementById('lista-historial').innerHTML = '<div class="empty">No se pudo cargar el historial.</div>';
            });
        });
    </script>
</body>
</html>
