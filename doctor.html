<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica - Panel Doctor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #4a4a4a;      
            --bg-card: #1c1c1c;      
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;   
            --blue-accent: #4682B4; 
            --green-accent: #1DB954;
            --orange-accent: #f59e0b;
            --red-accent: #d32f2f;   
            --border-color: rgba(255, 255, 255, 0.1); 
            --radius-box: 24px;
            --radius-card: 16px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .agenda-container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius-box);
            width: 95%; 
            max-width: 1200px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color);
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin: 0; letter-spacing: -1.5px; text-align: center; }
        .user-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 40px; text-align: center; }

        /* GRILLA DE COLUMNAS */
        .agenda-header, .paciente-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
        }

        .col-paciente { flex: 2; text-align: left; }
        .col-rut      { flex: 1.2; text-align: center; }
        .col-hora-c   { flex: 0.8; text-align: center; }
        .col-hora-ll  { flex: 0.8; text-align: center; }
        .col-estado   { flex: 1.2; text-align: center; }
        .col-acciones { flex: 1.5; text-align: right; display: flex; justify-content: flex-end; gap: 10px; min-height: 45px; }

        .agenda-header {
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 10px;
        }

        .agenda-header div {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .paciente-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .paciente-row:hover { background: rgba(255,255,255,0.06); }
        .paciente-name { font-weight: 700; font-size: 1.05rem; }
        .text-arrival { color: var(--orange-accent); font-weight: 600; }

        /* ETIQUETAS DE ESTADO */
        .status-tag {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .status-pendiente { background: rgba(255,255,255,0.05); color: #888; }
        .status-pagado { background: rgba(29, 185, 84, 0.15); color: var(--green-accent); }
        .status-llamando { background: rgba(70, 130, 180, 0.2); color: #7ab3e0; }
        .status-atendiendo { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

        /* TEXTO SIMPLE LLEGADO */
        .text-llegado {
            color: var(--orange-accent);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* BOTONES */
        button { cursor: pointer; transition: 0.2s; border: none; font-family: 'Inter', sans-serif; }
        .btn-action { padding: 10px 18px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: white; }
        .btn-call { background: var(--blue-accent); }
        .btn-wait { background: var(--orange-accent); }
        .btn-done { background: var(--green-accent); }
        .btn-delete { background: var(--red-accent); color: white; width: 34px; height: 34px; border-radius: 8px; font-weight: 800; }
        
        .btn-action:hover, .btn-delete:hover { opacity: 0.85; transform: translateY(-1px); }
        .footer-tools { margin-top: 40px; text-align: center; }
        .btn-logout { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 10px; font-size: 0.8rem; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.formatearRut = (rut) => {
            if (!rut) return "---";
            let v = rut.replace(/[.-]/g, '');
            return v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + v.slice(-1).toUpperCase();
        };

        window.cambiarEstado = async (id, nuevoEstado, nombre = null, infoBox = null) => {
            try {
                await updateDoc(doc(db, "agendados", id), { estado: nuevoEstado });
                if (nuevoEstado === 'llamando') {
                    // Actualiza la colección 'turnos' para que la TV lo muestre
                    await updateDoc(doc(db, "turnos", "actual"), { paciente: nombre, box: infoBox });
                }
            } catch (e) { console.error(e); }
        };

        window.cancelar = async (id, nombre) => {
            if (confirm(`¿Eliminar a ${nombre} de la lista?`)) await deleteDoc(doc(db, "agendados", id));
        };

        window.cerrarSesion = () => signOut(auth).then(() => location.href = "login.html");

        onAuthStateChanged(auth, (user) => {
            if (!user) { location.href = "login.html"; return; }
            document.getElementById('email-display').innerText = user.email;
            
            const q = query(collection(db, "agendados"), where("doctor_id", "==", user.email));
            
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('agenda-lista');
                container.innerHTML = "";
                
                snapshot.forEach((docSnap) => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    const estado = p.estado || 'pendiente';
                    
                    let estadoCeldaHTML = '';
                    let accionesHTML = '';

                    // LÓGICA DE VISUALIZACIÓN POR ESTADO
                    if (estado === 'llegado') {
                        estadoCeldaHTML = `<span class="text-llegado">En Recepción</span>`;
                        accionesHTML = ''; // ÁREA VACÍA HASTA QUE PAGUE
                    } else {
                        estadoCeldaHTML = `<span class="status-tag status-${estado}">${estado}</span>`;
                        
                        if (estado === 'pagado') {
                            accionesHTML = `<button class="btn-action btn-call" onclick="cambiarEstado('${id}', 'llamando', '${p.nombre}', '${p.piso} - ${p.consulta}')">LLAMAR</button>`;
                        } else if (estado === 'llamando') {
                            accionesHTML = `<button class="btn-action btn-wait" onclick="cambiarEstado('${id}', 'atendiendo')">ATENDIENDO</button>`;
                        } else if (estado === 'atendiendo') {
                            accionesHTML = `<button class="btn-action btn-done" onclick="cambiarEstado('${id}', 'atendido')">FINALIZAR</button>`;
                        }
                    }

                    const row = document.createElement('div');
                    row.className = 'paciente-row';
                    row.innerHTML = `
                        <div class="col-paciente paciente-name">${p.nombre}</div>
                        <div class="col-rut paciente-rut">${window.formatearRut(p.rut)}</div>
                        <div class="col-hora-c text-muted">${p.hora_consulta || '--:--'}</div>
                        <div class="col-hora-ll text-arrival">${p.hora_llegada || '--:--'}</div>
                        <div class="col-estado">${estadoCeldaHTML}</div>
                        <div class="col-acciones">
                            ${accionesHTML}
                            <button class="btn-delete" onclick="cancelar('${id}', '${p.nombre}')">✕</button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            });
        });
    </script>
</head>
<body>
    <div class="agenda-container">
        <h1>Agenda Médica</h1>
        <div class="user-email" id="email-display">Cargando...</div>
        
        <div class="agenda-header">
            <div class="col-paciente">Paciente</div>
            <div class="col-rut">RUT</div>
            <div class="col-hora-c">Cita</div>
            <div class="col-hora-ll">Llegada</div>
            <div class="col-estado">Estado</div>
            <div class="col-acciones">Acciones</div>
        </div>
        <div id="agenda-lista"></div>
        
        <div class="footer-tools">
            <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>
</body>
</html>
