<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Doctor - Agenda Médica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #4a4a4a;      
            --bg-card: #1c1c1c;      
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --color-recepcion: #FFB347; 
            --color-pagado: #48BB78;    
            --color-llamando: #4299E1;  
            --color-atendiendo: #9F7AEA; 
            --border-color: rgba(255, 255, 255, 0.1); 
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; text-align: center; }
        .user-name { color: #FFFFFF; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; text-align: center; display: block; opacity: 0.9; }

        h2 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .title-espera { color: var(--color-llamando); }
        .title-historial { color: var(--color-pagado); }

        /* Estructura de Columnas Restaurada */
        .header, .row { display: flex; align-items: center; padding: 12px 20px; }
        .header { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; }
        
        .col-name { flex: 2; }
        .col-rut  { flex: 1.2; text-align: center; }
        .col-info { flex: 1.5; text-align: center; } /* Piso / Consulta */
        .col-hora { flex: 0.8; text-align: center; }
        .col-est  { flex: 1; text-align: center; }
        .col-acts { flex: 1.5; text-align: right; }

        .row { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 8px; font-size: 0.9rem; }
        .name-txt { font-weight: 700; }
        .rut-txt { color: var(--text-muted); font-family: monospace; }
        .info-txt { color: #fdfd96; font-weight: 600; font-size: 0.8rem; }

        .st-txt { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .st-llegado { color: var(--color-recepcion); }
        .st-pagado { color: var(--color-pagado); }
        .st-llamando { color: var(--color-llamando); }
        .st-atendiendo { color: var(--color-atendiendo); }
        .st-atendido { color: var(--text-muted); }

        button { cursor: pointer; border: none; font-family: 'Inter', sans-serif; padding: 7px 12px; border-radius: 6px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; color: white; transition: 0.2s; }
        .btn-call { background: var(--color-llamando); }
        .btn-atn { background: var(--color-atendiendo); }
        .btn-fin { background: var(--color-pagado); }
        .btn-del { background: transparent; color: #FC8181; font-size: 1rem; margin-left: 10px; }

        .btn-logout { background: #d4d4a1; margin-top: 10px; padding: 10px 20px; font-size: 0.75rem; }
        .empty { color: var(--text-muted); font-size: 0.8rem; text-align: center; padding: 15px; }
    </style>
</head>
<body>

    <h1>AGENDA MÉDICA</h1>
    <div class="user-name" id="display-name">Cargando...</div>

    <div class="container">
        <h2 class="title-espera">● PACIENTES POR ATENDER</h2>
        <div class="header">
            <div class="col-name">Paciente</div>
            <div class="col-rut">RUT</div>
            <div class="col-info">Ubicación</div>
            <div class="col-hora">Cita</div>
            <div class="col-est">Estado</div>
            <div class="col-acts">Acción</div>
        </div>
        <div id="lista-espera"></div>
    </div>

    <div class="container" style="opacity: 0.8;">
        <h2 class="title-historial">✔ HISTORIAL DE HOY</h2>
        <div id="lista-historial"></div>
    </div>

    <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let nombreDoc = "", boxDoc = "";

        window.cambiarEstado = async (id, nuevo, nombre = "") => {
            try {
                await updateDoc(doc(db, "agendados", id), { estado: nuevo });
                if (nuevo === 'llamando') {
                    const hora = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
                    await updateDoc(doc(db, "turnos", "actual"), { paciente: nombre, box: boxDoc, doctor: nombreDoc, hora_llamado: hora });
                }
            } catch (e) { console.error(e); }
        };

        window.eliminar = async (id, nombre) => {
            if (confirm(`¿Eliminar a ${nombre}?`)) await deleteDoc(doc(db, "agendados", id));
        };

        document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.href="login.html");

        onAuthStateChanged(auth, async (user) => {
            if (!user) { location.href = "login.html"; return; }

            const dSnap = await getDoc(doc(db, "doctores", user.email.toLowerCase().trim()));
            if (dSnap.exists()) {
                nombreDoc = dSnap.data().nombre;
                boxDoc = `Piso ${dSnap.data().piso} - Consulta ${dSnap.data().consulta}`;
                document.getElementById('display-name').innerText = `DR. ${nombreDoc}`;
            }

            const q = query(collection(db, "agendados"), where("doctor_id", "==", user.email));
            onSnapshot(q, (snapshot) => {
                const esperaDiv = document.getElementById('lista-espera');
                const historialDiv = document.getElementById('lista-historial');
                esperaDiv.innerHTML = ""; historialDiv.innerHTML = "";
                let cE = 0, cH = 0;

                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    const estado = p.estado || 'pendiente';
                    const esHistorial = (estado === 'atendido');

                    const row = document.createElement('div');
                    row.className = "row";
                    
                    let botones = '';
                    if (estado === 'pagado') botones = `<button class="btn-call" onclick="cambiarEstado('${id}','llamando','${p.nombre}')">Llamar</button>`;
                    else if (estado === 'llamando') botones = `<button class="btn-atn" onclick="cambiarEstado('${id}','atendiendo')">Atender</button>`;
                    else if (estado === 'atendiendo') botones = `<button class="btn-fin" onclick="cambiarEstado('${id}','atendido')">Finalizar</button>`;

                    row.innerHTML = `
                        <div class="col-name name-txt">${p.nombre}</div>
                        <div class="col-rut rut-txt">${p.rut}</div>
                        <div class="col-info info-txt">${boxDoc}</div>
                        <div class="col-hora">${p.hora_consulta}</div>
                        <div class="col-est st-txt st-${estado}">${estado === 'llegado' ? 'En Recepción' : estado}</div>
                        <div class="col-acts">
                            ${botones}
                            <button class="btn-del" onclick="eliminar('${id}','${p.nombre}')">✕</button>
                        </div>
                    `;

                    if (esHistorial) { historialDiv.appendChild(row); cH++; }
                    else { esperaDiv.appendChild(row); cE++; }
                });

                if(cE === 0) esperaDiv.innerHTML = '<div class="empty">No hay pacientes por atender.</div>';
                if(cH === 0) historialDiv.innerHTML = '<div class="empty">No hay historial hoy.</div>';
            });
        });
    </script>
</body>
</html>
