<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Agenda</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --bg-main: #121212;
            --bg-card: #1E1E1E;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-blue-mate: #4682B4; 
            --accent-blue-hover: #5492C4;
            --input-bg: #2A2A2A;
            --input-border: #3E3E3E;
            --radius-custom: 10px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            margin: 0; 
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box { 
            background: var(--bg-card); 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 500px; /* Un poco más ancho para las filas */
            min-height: 600px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            display: block; /* IMPORTANTE: Cambiado de flex a block para evitar amontonamiento */
        }

        h1 { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 5px; }
        .doc-info { text-align: center; color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 30px; opacity: 0.6; }

        /* ESTILO DE FILA DE PACIENTE */
        .paciente-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-custom);
            padding: 25px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box; /* Para que el padding no ensanche la caja */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .paciente-nombre { 
            font-weight: 800; 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            text-align: center;
        }

        .paciente-rut { 
            color: var(--text-secondary); 
            font-size: 0.9rem; 
            margin-bottom: 15px; 
        }

        /* BOTONES OCUPANDO TODA LA FILA */
        .btn-accion { 
            width: 100%; 
            padding: 18px; 
            font-size: 1rem; 
            background: var(--accent-blue-mate); 
            color: white; 
            border: none; 
            border-radius: var(--radius-custom); 
            cursor: pointer; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.1em;
        }

        .btn-atendiendo { background: #1DB954; }
        .btn-finalizar { background: #555; }
        
        .status-atendido { 
            color: #1DB954; 
            font-weight: 700; 
            border: 1px solid #1DB954; 
            padding: 10px 20px; 
            border-radius: 5px; 
            text-transform: uppercase;
        }

        .btn-logout { 
            width: 100%;
            background: transparent; 
            color: #444; 
            border: none; 
            margin-top: 40px; 
            text-decoration: underline; 
            cursor: pointer; 
        }

        .hidden { display: none; }

        /* Estilos para el Login */
        .login-input {
            width: 100%; padding: 20px; margin-bottom: 15px;
            background: var(--input-bg); border: 2px solid var(--input-border);
            border-radius: var(--radius-custom); color: white; text-align: center;
            box-sizing: border-box; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="box">
        <div id="login-section">
            <h1>Ingreso Médico</h1>
            <p style="text-align:center; color:gray;">Gestión de pacientes</p>
            <input type="email" id="email" class="login-input" placeholder="Correo electrónico">
            <input type="password" id="password" class="login-input" placeholder="Contraseña">
            <button class="btn-accion" id="btnLogin">INGRESAR</button>
        </div>

        <div id="doctor-section" class="hidden">
            <h1>Agenda Médica</h1>
            <div class="doc-info" id="doc-email"></div>
            
            <div id="lista-pacientes">
                </div>

            <button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Error al entrar"));
        });

        window.cerrarSesion = () => signOut(auth);

        window.cambiarEstado = async (id, nuevoEstado, nombre, box) => {
            await updateDoc(doc(db, "agendados", id), { estado: nuevoEstado });
            if (nuevoEstado === 'llamando') {
                await updateDoc(doc(db, "turnos", "actual"), { paciente: nombre, box: box });
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('doctor-section').classList.remove('hidden');
                document.getElementById('doc-email').innerText = user.email;

                const q = query(collection(db, "agendados"), where("doctor_id", "==", user.email));
                
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('lista-pacientes');
                    container.innerHTML = "";
                    
                    snapshot.forEach((docSnap) => {
                        const p = docSnap.data();
                        const id = docSnap.id;
                        const estado = p.estado || 'llegado';
                        
                        const item = document.createElement('div');
                        item.className = 'paciente-item';
                        
                        let controles = '';
                        if (estado === 'llegado') {
                            controles = `<button class="btn-accion" onclick="cambiarEstado('${id}', 'llamando', '${p.nombre}', '${p.piso} ${p.consulta}')">LLAMAR</button>`;
                        } else if (estado === 'llamando') {
                            controles = `<button class="btn-accion btn-atendiendo" onclick="cambiarEstado('${id}', 'atendiendo')">ATENDIENDO</button>`;
                        } else if (estado === 'atendiendo') {
                            controles = `<button class="btn-accion btn-finalizar" onclick="cambiarEstado('${id}', 'atendido')">FINALIZAR</button>`;
                        } else {
                            controles = `<span class="status-atendido">ATENDIDO ✓</span>`;
                        }

                        item.innerHTML = `
                            <div class="paciente-nombre">${p.nombre}</div>
                            <div class="paciente-rut">RUT: ${p.rut}</div>
                            ${controles}
                        `;
                        container.appendChild(item);
                    });
                });
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('doctor-section').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
