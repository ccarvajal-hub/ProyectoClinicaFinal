<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Médica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="doctor.css" />
</head>
<body>
    <div class="page-header">
        <h1>AGENDA MÉDICA</h1>
        <div class="page-subtitle" id="display-name">CARGANDO...</div>
    </div>

    <div class="container container-pacientes">
    <div class="topbar">
        <div class="topbar-left">
            <h2 class="title-espera">● PACIENTES POR ATENDER</h2>
            <div class="agenda-dia" id="agenda-dia">Agenda del día: --</div>
        </div>
        <div class="topbar-right">
            <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
        </div>
    </div>

        <div class="row-espera header">
            <div>Paciente</div>
            <div>RUT</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Llegada</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Acción</div>
        </div>

        <div id="lista-espera"></div>
    </div>

    <div class="container container-historial">
        <h2 class="title-atendidos">✔ HISTORIAL</h2>

        <div class="row-historial header">
            <div>Paciente</div>
            <div>RUT</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Llegada</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Resultado</div>
        </div>

        <div id="lista-historial"></div>
    </div>

    <script type="module" src="doctor.js"></script>
</body>
</html>
