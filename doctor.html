<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Médicos - Agenda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-page: #4a4a4a; --bg-card: #1c1c1c; --text-main: #FFFFFF; --text-muted: #A0A0A0; --blue-accent: #4682B4; --orange-accent: #f59e0b; --border-color: rgba(255, 255, 255, 0.1); --radius: 24px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-page); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); flex-direction: column; }
        .login-container { background-color: var(--bg-card); padding: 50px 40px; border-radius: var(--radius); width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 12px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 16px; background-color: var(--blue-accent); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .dev-tools { margin-top: 30px; display: flex; gap: 15px; }
        .btn-dev { padding: 12px 20px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; cursor: pointer; background: transparent; }
        .btn-seed { border: 1px solid var(--blue-accent); color: var(--blue-accent); }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Bienvenido</h1>
        <input type="email" id="email" placeholder="doctor@clinica.cl">
        <input type="password" id="password" placeholder="••••••••">
        <button class="btn-login" id="loginBtn">Iniciar Sesión</button>
    </div>
    <div class="dev-tools">
        <button class="btn-dev btn-seed" onclick="crearPacientesPrueba()">Crear Pacientes Test</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts", authDomain: "llamado-cliente.firebaseapp.com", projectId: "llamado-cliente", storageBucket: "llamado-cliente.appspot.com", messagingSenderId: "444376711880", appId: "1:444376711880:web:01c32061eea040ef0f9bfd" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, email.value, password.value); window.location.href = "doctor.html"; } catch (e) { alert("Error"); }
        });

        window.crearPacientesPrueba = async () => {
            const pacientes = [
                { nombre: "JUAN PEREZ", rut: "12345678K", hora_consulta: "09:00", estado: "pendiente", doctor_id: "doctor@clinica.cl", consulta: "101", piso: "Piso 1" },
                { nombre: "MARIA GONZALEZ", rut: "112223334", hora_consulta: "09:30", estado: "pendiente", doctor_id: "doctor@clinica.cl", consulta: "101", piso: "Piso 1" }
            ];
            for (let p of pacientes) { await addDoc(collection(db, "agendados"), p); }
            alert("Pacientes creados!");
        };
    </script>
</body>
</html>
