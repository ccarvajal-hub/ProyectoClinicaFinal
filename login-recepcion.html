<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Recepción - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login-recepcion.css">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>Bienvenido</h1>
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input
                type="email"
                id="email"
                placeholder="recepcion@clinica.cl"
                autocomplete="username"
            />
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrap">
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                />
                <button type="button" class="toggle-password" id="togglePassword">
                    Mostrar
                </button>
            </div>
        </div>

        <button class="btn-login" id="btnLogin" type="button">Iniciar Sesión</button>

        <div id="error-message" class="error-msg"></div>
        <div id="ok-message" class="ok-msg"></div>

        <div class="small-note">
            Para iniciar sesión, tu usuario debe estar registrado en<br>
            <b>FIREBASE AUTHENTICATION</b>.
        </div>

        <div class="module-pill module-pill-bottom">MÓDULO RECEPCIÓN</div>

        <div class="dev-tools" id="devTools">
            <button class="btn-dev btn-seed" id="btnCrearDemo" type="button">Crear recepcionista</button>
            <button class="btn-dev btn-check" id="btnProbarColeccion" type="button">Probar colección</button>
        </div>
    </div>

    <button id="btnModoDev" type="button" class="btn-dev-floating">Modo dev</button>

    <div id="devModal" class="dev-modal hidden">
        <div class="dev-modal-content">
            <div class="dev-modal-header">
                <h3>Seleccionar cuenta recepción</h3>
                <button type="button" id="btnCerrarDev" class="dev-close">×</button>
            </div>

            <div class="dev-account-list">
                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="recepcion1@clinica.cl"
                    data-password="123456"
                >
                    recepcion1@clinica.cl
                </button>

                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="recepcion2@clinica.cl"
                    data-password="123456"
                >
                    recepcion2@clinica.cl
                </button>

                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="recepcion3@clinica.cl"
                    data-password="123456"
                >
                    recepcion3@clinica.cl
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="login-recepcion.js"></script>
</body>
</html>
