<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Recepción - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login-recepcion.css">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="module-pill">MÓDULO RECEPCIÓN</div>
            <h1>Bienvenido</h1>
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input
                type="email"
                id="email"
                placeholder="recepcion@clinica.cl"
                autocomplete="username"
            />
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrap">
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                />
                <button type="button" class="toggle-password" id="togglePassword">
                    Mostrar
                </button>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">Iniciar Sesión</button>

        <div id="error-text" class="error-msg"></div>
        <div id="ok-text" class="ok-msg"></div>

        <div class="small-note">
            Para iniciar sesión, tu usuario debe estar registrado en <b>Firebase Authentication</b>.
        </div>
    </div>

    <div class="dev-tools" id="devTools">
        <button class="btn-dev btn-seed" id="btnCrearDemo">Crear recepcionista</button>
        <button class="btn-dev btn-check" id="btnProbarColeccion">Probar colección</button>
    </div>

    <script type="module" src="login-recepcion.js"></script>
</body>
</html>
