<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
        authDomain: "llamado-cliente.firebaseapp.com",
        projectId: "llamado-cliente",
        storageBucket: "llamado-cliente.appspot.com",
        messagingSenderId: "444376711880",
        appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const input = document.getElementById('rutInput');
    const btnConfirmar = document.getElementById('btnConfirmar');
    const modal = document.getElementById('modalConfirmacion');
    let html5QrScanner = null;

    // NORMALIZACIÓN ABSOLUTA
    function limpiarRUT(rut) { 
        if (!rut) return "";
        return rut.replace(/[^0-9kK]/g, '').toUpperCase(); 
    }

    function formatearRUT(rut) {
        let limpio = limpiarRUT(rut);
        if (limpio.length <= 1) return limpio;
        const cuerpo = limpio.slice(0, -1);
        const dv = limpio.slice(-1);
        return cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + dv;
    }

    function validarRUT(rut) {
        rut = limpiarRUT(rut);
        if (rut.length < 8) return false;
        const cuerpo = rut.slice(0, -1);
        const dv = rut.slice(-1);
        let suma = 0, mult = 2;
        for (let i = cuerpo.length - 1; i >= 0; i--) {
            suma += cuerpo[i] * mult;
            mult = mult < 7 ? mult + 1 : 2;
        }
        const dvEsperado = 11 - (suma % 11);
        const dvFinal = dvEsperado === 11 ? '0' : dvEsperado === 10 ? 'K' : String(dvEsperado);
        return dv === dvFinal;
    }

    function obtenerFechaHoyChile() {
        return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Santiago' }).format(new Date());
    }

    // LÓGICA DE BÚSQUEDA CORREGIDA
    btnConfirmar.onclick = async () => {
        const rutLimpio = limpiarRUT(input.value);
        if (!validarRUT(rutLimpio)) {
            alert("RUT Inválido. Asegúrate de incluir el dígito verificador.");
            return;
        }

        btnConfirmar.disabled = true;
        btnConfirmar.innerText = "BUSCANDO...";

        try {
            const hoy = obtenerFechaHoyChile();
            const rutFormateado = formatearRUT(rutLimpio);
            
            // Buscamos de ambas formas simultáneamente
            const q1 = query(collection(db, "agendados"), where("rut", "==", rutLimpio), where("fecha_turno", "==", hoy));
            const q2 = query(collection(db, "agendados"), where("rut", "==", rutFormateado), where("fecha_turno", "==", hoy));
            
            const [snap1, snap2] = await Promise.all([getDocs(q1), getDocs(q2)]);
            
            const docSnap = !snap1.empty ? snap1.docs[0] : (!snap2.empty ? snap2.docs[0] : null);

            if (!docSnap) {
                // AQUÍ ES DONDE FALLABA ANTES: Ahora lanzamos el error y LIMPIAMOS
                alert("NO TIENES CONSULTA PROGRAMADA\nNo encontramos ninguna cita para hoy con el RUT " + rutFormateado);
                input.value = "";
                btnConfirmar.disabled = false;
                btnConfirmar.innerText = "Confirmar Llegada";
                return; 
            }

            const data = docSnap.data();
            const estado = (data.estado || "").toLowerCase();

            // BLOQUEO DE DOBLE INGRESO
            if (['llegado', 'pagado', 'llamando', 'atendiendo', 'atendido'].includes(estado)) {
                abrirModal("YA REGISTRADO", "info", "Tu llegada ya fue procesada anteriormente. Por favor, espera en la sala.", data, docSnap.id);
                return;
            }

            // SI TODO ESTÁ BIEN, REGISTRAMOS
            const horaActual = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
            await updateDoc(doc(db, "agendados", docSnap.id), {
                estado: "llegado",
                hora_llegada: horaActual
            });

            abrirModal("LLEGADA CONFIRMADA", "success", "Registro exitoso. Dirígete a recepción para el pago.", data, docSnap.id);

        } catch (e) {
            console.error("Error crítico:", e);
            alert("Error de conexión. Intenta de nuevo.");
        } finally {
            btnConfirmar.disabled = false;
            btnConfirmar.innerText = "Confirmar Llegada";
        }
    };

    // ESCÁNER
    document.getElementById('btnScan').onclick = () => {
        const reader = document.getElementById('reader');
        reader.style.display = 'block';
        html5QrScanner = new Html5Qrcode("reader");
        html5QrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
        (text) => {
            const match = text.match(/(\d{1,2}\.?\d{3}\.?\d{3}-?[\dkK])/);
            if (match) {
                input.value = match[0];
                html5QrScanner.stop();
                reader.style.display = 'none';
                btnConfirmar.click(); 
            }
        }).catch(err => console.error(err));
    };

    async function abrirModal(titulo, tipo, msg, data, idDoc) {
        document.getElementById('modalTitulo').innerText = titulo;
        document.getElementById('modalTitulo').className = titulo === "YA REGISTRADO" ? "info" : "success";
        document.getElementById('modalMensaje').innerText = msg;
        document.getElementById('resNombre').innerText = data.nombre || 'Paciente';
        
        // Carga de Doctor
        try {
            const docDoc = await getDoc(doc(db, "doctores", data.doctor_id.trim().toLowerCase()));
            if(docDoc.exists()){
                const d = docDoc.data();
                document.getElementById('resDoctor').innerText = d.nombre;
                document.getElementById('resUbicacion').innerText = `Piso ${d.piso} - Box ${d.consulta}`;
            } else {
                document.getElementById('resDoctor').innerText = "Personal de Turno";
                document.getElementById('resUbicacion').innerText = "Mesón Recepción";
            }
        } catch (e) {
            document.getElementById('resDoctor').innerText = "Consultar en Mesón";
        }

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://tu-web.app/ticket.html?id=${idDoc}`,
            width: 150, height: 150
        });

        modal.style.display = 'flex';
        input.value = "";
    }

    document.getElementById('btnCerrarModal').onclick = () => modal.style.display = 'none';
    input.oninput = () => input.value = formatearRUT(input.value);
</script>
