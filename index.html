<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tótem de Atención - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #4a4a4a;
            --bg-card: #1c1c1c;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4;
            --green-muted: #2D6A4F; 
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .totem-card {
            background-color: var(--bg-card);
            padding: 60px 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -2px; }
        .instruction { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        input {
            width: 100%;
            padding: 24px;
            background: #2a2a2a;
            border: 2px solid var(--border-color);
            border-radius: 18px;
            color: white;
            font-size: 1.8rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            font-weight: 700;
        }

        .btn-confirm {
            width: 100%;
            padding: 22px;
            background-color: var(--blue-accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 25px;
        }

        /* MODAL MATE */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 45px;
            border-radius: var(--radius);
            border: 1px solid #333;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 { color: #48BB78; font-size: 1.8rem; margin: 0 0 25px 0; font-weight: 800; }
        
        .info-box { 
            background: #252525; 
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            text-align: left;
        }

        .info-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .info-item:last-child { margin-bottom: 0; border: none; }
        
        .info-label { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 4px; }
        .info-value { font-weight: 700; color: white; font-size: 1.2rem; }

        .btn-close {
            background: var(--green-muted);
            color: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="totem-card">
        <h1>Bienvenido</h1>
        <p class="instruction">Ingrese su RUT para confirmar su llegada.</p>
        <input type="text" id="rutInput" placeholder="12.345.678-K" autocomplete="off">
        <button class="btn-confirm" id="btnConfirmar">Confirmar Llegada</button>
    </div>

    <div class="modal-overlay" id="modalConfirmacion">
        <div class="modal-content">
            <h2>LLEGADA CONFIRMADA</h2>
            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Paciente</span>
                    <span class="info-value" id="resNombre">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Médico</span>
                    <span class="info-value" id="resDoctor">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Ubicación</span>
                    <span class="info-value" id="resUbicacion">---</span>
                </div>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">
                Por favor, diríjase a Recepción para pagar su atención.
            </p>
            <button class="btn-close" onclick="cerrarModal()">ENTENDIDO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Agregamos getDoc para buscar al doctor individualmente
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const input = document.getElementById('rutInput');
        const modal = document.getElementById('modalConfirmacion');
        const btn = document.getElementById('btnConfirmar');

        btn.addEventListener('click', async () => {
            let rutLimpio = input.value.trim().replace(/[\.-]/g, '').toUpperCase();
            if (!rutLimpio) return;

            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
                const q = query(collection(db, "agendados"), where("rut", "==", rutLimpio));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const docSnap = querySnapshot.docs[0];
                    const p = docSnap.data();

                    // 1. Obtener hora en 24h
                    const ahora24 = new Date().toLocaleTimeString('es-CL', { 
                        hour: '2-digit', 
                        minute: '2-digit', 
                        hour12: false 
                    });
                    
                    // 2. Actualizar llegada del paciente
                    await updateDoc(doc(db, "agendados", docSnap.id), {
                        estado: "llegado",
                        hora_llegada: ahora24
                    });

                    // --- NUEVA LÓGICA: BUSCAR NOMBRE REAL DEL DOCTOR ---
                    let nombreDoctorMostrar = p.doctor_id; // Valor por defecto (el email)
                    try {
                        const docRefDoc = doc(db, "doctores", p.doctor_id);
                        const docSnapDoc = await getDoc(docRefDoc);
                        if (docSnapDoc.exists()) {
                            nombreDoctorMostrar = docSnapDoc.data().nombre;
                        } else {
                            // Si no existe en la colección, formateamos el email un poco
                            nombreDoctorMostrar = "Dr(a). " + p.doctor_id.split('@')[0].toUpperCase();
                        }
                    } catch (err) {
                        console.log("Error buscando doctor:", err);
                    }

                    // 3. Mostrar datos en el modal
                    document.getElementById('resNombre').innerText = p.nombre;
                    document.getElementById('resDoctor').innerText = nombreDoctorMostrar;
                    document.getElementById('resUbicacion').innerText = `${p.piso} - Consulta ${p.consulta}`;

                    modal.style.display = 'flex';
                    input.value = "";
                } else {
                    alert("RUT no encontrado.");
                }
            } catch (error) {
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Llegada";
            }
        });

        window.cerrarModal = () => {
            modal.style.display = 'none';
        };
    </script>
</body>
</html>
