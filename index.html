<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tótem de Atención - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#1c1c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-page: #4a4a4a;
            --bg-card: #1c1c1c;
            --bg-card-2: #252525;
            --bg-key: #2f2f2f;
            --bg-key-alt: #3a3a3a;
            --bg-key-action: #4682B4;
            --bg-key-danger: #6b3030;
            --bg-key-success: #2D6A4F;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4;
            --green-muted: #2D6A4F;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
            --keyboard-height: 360px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .app-shell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: padding-bottom 0.25s ease;
        }

        .app-shell.keyboard-open {
            padding-bottom: calc(var(--keyboard-height) - 40px);
        }

        .totem-card {
            background-color: var(--bg-card);
            padding: 60px 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .instruction {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .rut-input-wrap {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 24px;
            background: #2a2a2a;
            border: 2px solid var(--border-color);
            border-radius: 18px;
            color: white;
            font-size: 1.8rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            font-weight: 700;
            caret-color: transparent;
            cursor: pointer;
        }

        input.active {
            border-color: rgba(70, 130, 180, 0.95);
            box-shadow: 0 0 0 4px rgba(70, 130, 180, 0.15);
        }

        .input-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 18px;
        }

        .btn-confirm {
            width: 100%;
            padding: 22px;
            background-color: var(--blue-accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 25px;
        }

        .btn-confirm:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 45px;
            border-radius: var(--radius);
            border: 1px solid #333;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .modal-content h2 {
            color: #48BB78;
            font-size: 1.8rem;
            margin: 0 0 25px 0;
            font-weight: 800;
        }

        .info-box {
            background: #252525;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .info-item:last-child {
            margin-bottom: 0;
            border: none;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
        }

        .btn-close {
            background: var(--green-muted);
            color: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .keyboard-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease;
            z-index: 1500;
        }

        .keyboard-backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .keyboard-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: var(--keyboard-height);
            background: linear-gradient(180deg, #2a2a2a 0%, #232323 100%);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            border-top: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.35);
            transform: translateY(100%);
            transition: transform 0.24s ease;
            z-index: 2000;
            padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
        }

        .keyboard-panel.open {
            transform: translateY(0);
        }

        .keyboard-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 6px;
        }

        .keyboard-title {
            color: var(--text-muted);
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .keyboard-hide-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 10px;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            height: calc(100% - 44px);
        }

        .key {
            border: none;
            border-radius: 18px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            color: white;
            cursor: pointer;
            background: var(--bg-key);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
            font-size: 1.6rem;
        }

        .key:active {
            transform: scale(0.985);
        }

        .key.alt {
            background: var(--bg-key-alt);
            font-size: 1.15rem;
        }

        .key.action {
            background: var(--bg-key-action);
            font-size: 1.05rem;
        }

        .key.success {
            background: var(--bg-key-success);
            font-size: 1.05rem;
        }

        .key.danger {
            background: var(--bg-key-danger);
            font-size: 1rem;
        }

        @media (max-width: 640px) {
            :root {
                --keyboard-height: 350px;
            }

            .totem-card {
                padding: 40px 22px;
            }

            h1 {
                font-size: 2.2rem;
            }

            input {
                font-size: 1.55rem;
                padding: 20px;
            }

            .btn-confirm {
                font-size: 1.1rem;
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="app-shell" id="appShell">
        <div class="totem-card">
            <h1>Bienvenido</h1>
            <p class="instruction">Ingrese su RUT para confirmar su llegada.</p>

            <div class="rut-input-wrap">
                <input
                    type="text"
                    id="rutInput"
                    placeholder="12.345.678-K"
                    autocomplete="off"
                    autocapitalize="characters"
                    maxlength="12"
                    readonly
                    inputmode="none"
                >
                <div class="input-hint" id="inputHint">Toque el campo para ingresar su RUT</div>
            </div>

            <button class="btn-confirm" id="btnConfirmar">Confirmar Llegada</button>
        </div>
    </div>

    <div class="keyboard-backdrop" id="keyboardBackdrop"></div>

    <div class="keyboard-panel" id="keyboardPanel">
        <div class="keyboard-topbar">
            <div class="keyboard-title">Ingreso de RUT</div>
            <button class="keyboard-hide-btn" id="btnOcultarTeclado" type="button">Ocultar</button>
        </div>

        <div class="keyboard-grid">
            <button class="key" type="button" data-key="1">1</button>
            <button class="key" type="button" data-key="2">2</button>
            <button class="key" type="button" data-key="3">3</button>

            <button class="key" type="button" data-key="4">4</button>
            <button class="key" type="button" data-key="5">5</button>
            <button class="key" type="button" data-key="6">6</button>

            <button class="key" type="button" data-key="7">7</button>
            <button class="key" type="button" data-key="8">8</button>
            <button class="key" type="button" data-key="9">9</button>

            <button class="key alt" type="button" id="btnBorrar">⌫</button>
            <button class="key" type="button" data-key="0">0</button>
            <button class="key alt" type="button" data-key="K">K</button>

            <button class="key danger" type="button" id="btnLimpiar">Limpiar</button>
            <button class="key action" type="button" id="btnCerrarTeclado">Cerrar</button>
            <button class="key success" type="button" id="btnConfirmarTeclado">Confirmar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalConfirmacion">
        <div class="modal-content">
            <h2>LLEGADA CONFIRMADA</h2>
            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Paciente</span>
                    <span class="info-value" id="resNombre">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Médico</span>
                    <span class="info-value" id="resDoctor">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Ubicación</span>
                    <span class="info-value" id="resUbicacion">---</span>
                </div>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">
                Por favor, diríjase a Recepción para pagar su atención.
            </p>
            <button class="btn-close" onclick="cerrarModal()">ENTENDIDO</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const input = document.getElementById('rutInput');
        const modal = document.getElementById('modalConfirmacion');
        const btn = document.getElementById('btnConfirmar');
        const inputHint = document.getElementById('inputHint');

        const appShell = document.getElementById('appShell');
        const keyboardPanel = document.getElementById('keyboardPanel');
        const keyboardBackdrop = document.getElementById('keyboardBackdrop');
        const btnOcultarTeclado = document.getElementById('btnOcultarTeclado');
        const btnCerrarTeclado = document.getElementById('btnCerrarTeclado');
        const btnBorrar = document.getElementById('btnBorrar');
        const btnLimpiar = document.getElementById('btnLimpiar');
        const btnConfirmarTeclado = document.getElementById('btnConfirmarTeclado');
        const keyButtons = Array.from(document.querySelectorAll('[data-key]'));

        let resetTimer = null;
        let audioContext = null;

        function inicializarAudio() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;

                if (!audioContext) {
                    audioContext = new AudioCtx();
                }

                if (audioContext.state === 'suspended') {
                    audioContext.resume().catch(() => {});
                }
            } catch (error) {
                console.error('Error inicializando audio:', error);
            }
        }

        async function reproducirSonidoConfirmacion() {
            try {
                inicializarAudio();
                if (!audioContext) return;

                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const now = audioContext.currentTime;

                const gain = audioContext.createGain();
                gain.connect(audioContext.destination);
                gain.gain.setValueAtTime(0.0001, now);

                const osc1 = audioContext.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, now);

                const osc2 = audioContext.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1174.66, now + 0.12);

                osc1.connect(gain);
                osc2.connect(gain);

                gain.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.03, now + 0.10);
                gain.gain.exponentialRampToValueAtTime(0.09, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);

                osc1.start(now);
                osc1.stop(now + 0.14);

                osc2.start(now + 0.12);
                osc2.stop(now + 0.35);
            } catch (error) {
                console.error('Error reproduciendo sonido:', error);
            }
        }

        function limpiarRUT(rut) {
            return rut.replace(/[^0-9kK]/g, '').toUpperCase();
        }

        function formatearRUT(rut) {
            const limpio = limpiarRUT(rut).slice(0, 9);

            if (limpio.length <= 1) return limpio;

            const cuerpo = limpio.slice(0, -1);
            const dv = limpio.slice(-1);

            let cuerpoFormateado = '';
            let contador = 0;

            for (let i = cuerpo.length - 1; i >= 0; i--) {
                cuerpoFormateado = cuerpo[i] + cuerpoFormateado;
                contador++;

                if (contador === 3 && i !== 0) {
                    cuerpoFormateado = '.' + cuerpoFormateado;
                    contador = 0;
                }
            }

            return `${cuerpoFormateado}-${dv}`;
        }

        function validarRUT(rut) {
            rut = limpiarRUT(rut);

            if (!/^\d{7,8}[0-9K]$/.test(rut)) return false;

            const cuerpo = rut.slice(0, -1);
            const dvIngresado = rut.slice(-1);

            let suma = 0;
            let multiplo = 2;

            for (let i = cuerpo.length - 1; i >= 0; i--) {
                suma += parseInt(cuerpo[i], 10) * multiplo;
                multiplo = multiplo < 7 ? multiplo + 1 : 2;
            }

            const resto = suma % 11;
            const dvEsperadoNum = 11 - resto;

            let dvEsperado = '';
            if (dvEsperadoNum === 11) dvEsperado = '0';
            else if (dvEsperadoNum === 10) dvEsperado = 'K';
            else dvEsperado = String(dvEsperadoNum);

            return dvIngresado === dvEsperado;
        }

        function obtenerFechaHoyChile() {
            const partes = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Santiago',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).formatToParts(new Date());

            const year = partes.find(p => p.type === 'year').value;
            const month = partes.find(p => p.type === 'month').value;
            const day = partes.find(p => p.type === 'day').value;

            return `${year}-${month}-${day}`;
        }

        function horaATotalMinutos(hora) {
            if (!hora || typeof hora !== 'string') return 999999;

            const [hh, mm] = hora.split(':').map(Number);

            if (Number.isNaN(hh) || Number.isNaN(mm)) return 999999;

            return (hh * 60) + mm;
        }

        function seleccionarCitaCorrecta(docs) {
            const estadosValidos = ['pendiente', 'agendado', 'confirmado', 'llegado', 'en_recepcion'];

            const citasValidas = docs.filter(item => {
                const estado = (item.data().estado || '').toLowerCase().trim();
                return estadosValidos.includes(estado);
            });

            if (citasValidas.length === 0) return null;

            citasValidas.sort((a, b) => {
                const horaA = horaATotalMinutos(a.data().hora_consulta);
                const horaB = horaATotalMinutos(b.data().hora_consulta);
                return horaA - horaB;
            });

            return citasValidas[0];
        }

        function cancelarResetInput() {
            if (resetTimer) {
                clearTimeout(resetTimer);
                resetTimer = null;
            }
        }

        function abrirTeclado() {
            if (btn.disabled) return;
            if (modal.style.display === 'flex') return;

            keyboardPanel.classList.add('open');
            keyboardBackdrop.classList.add('open');
            appShell.classList.add('keyboard-open');
            input.classList.add('active');
            actualizarHint();
            programarResetInput();
        }

        function cerrarTeclado() {
            keyboardPanel.classList.remove('open');
            keyboardBackdrop.classList.remove('open');
            appShell.classList.remove('keyboard-open');
            input.classList.remove('active');
            actualizarHint();
        }

        function actualizarHint() {
            if (keyboardPanel.classList.contains('open')) {
                inputHint.textContent = input.value ? 'Use el teclado inferior para completar o corregir su RUT' : 'Ingrese su RUT con el teclado inferior';
            } else {
                inputHint.textContent = input.value ? 'Toque el campo para seguir editando su RUT' : 'Toque el campo para ingresar su RUT';
            }
        }

        function resetearInputRUT() {
            cancelarResetInput();
            input.value = '';
            actualizarHint();
            abrirTeclado();
        }

        function programarResetInput() {
            cancelarResetInput();

            if (!input.value.trim()) return;
            if (btn.disabled) return;
            if (modal.style.display === 'flex') return;

            resetTimer = setTimeout(() => {
                if (!btn.disabled && modal.style.display !== 'flex') {
                    input.value = '';
                    actualizarHint();
                    abrirTeclado();
                }
            }, 10000);
        }

        function insertarCaracter(valor) {
            const limpioActual = limpiarRUT(input.value);

            if (limpioActual.length >= 9) return;

            const nuevo = limpioActual + valor;
            input.value = formatearRUT(nuevo);
            actualizarHint();
            programarResetInput();
        }

        function borrarUltimoCaracter() {
            const limpioActual = limpiarRUT(input.value);

            if (!limpioActual.length) return;

            const nuevo = limpioActual.slice(0, -1);
            input.value = formatearRUT(nuevo);
            actualizarHint();
            programarResetInput();
        }

        function limpiarCampo() {
            input.value = '';
            actualizarHint();
            cancelarResetInput();
        }

        async function procesarLlegada() {
            cancelarResetInput();

            const rutLimpio = limpiarRUT(input.value);
            if (!rutLimpio) {
                resetearInputRUT();
                return;
            }

            if (!validarRUT(rutLimpio)) {
                alert("RUT inválido. Verifique e intente nuevamente.");
                resetearInputRUT();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";
            btnConfirmarTeclado.disabled = true;

            try {
                const fechaHoy = obtenerFechaHoyChile();

                const q = query(
                    collection(db, "agendados"),
                    where("rut", "==", rutLimpio),
                    where("fecha_turno", "==", fechaHoy)
                );

                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const citaSeleccionada = seleccionarCitaCorrecta(querySnapshot.docs);

                    if (!citaSeleccionada) {
                        alert("No tiene una cita válida para hoy.");
                        resetearInputRUT();
                        return;
                    }

                    const docSnap = citaSeleccionada;
                    const p = docSnap.data();

                    const ahora24 = new Date().toLocaleTimeString('es-CL', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });

                    await updateDoc(doc(db, "agendados", docSnap.id), {
                        estado: "llegado",
                        hora_llegada: ahora24
                    });

                    let nombreDoctorMostrar = "No asignado";
                    let ubicacionMostrar = "Por confirmar";

                    if (p.doctor_id) {
                        const idBuscado = p.doctor_id.trim().toLowerCase();
                        const docRefDoc = doc(db, "doctores", idBuscado);
                        const docSnapDoc = await getDoc(docRefDoc);

                        if (docSnapDoc.exists()) {
                            const dData = docSnapDoc.data();
                            nombreDoctorMostrar = dData.nombre;
                            ubicacionMostrar = `Piso ${dData.piso} - Consulta ${dData.consulta}`;
                        } else {
                            nombreDoctorMostrar = "Dr(a). " + idBuscado.split('@')[0].toUpperCase();
                        }
                    }

                    document.getElementById('resNombre').innerText = p.nombre;
                    document.getElementById('resDoctor').innerText = nombreDoctorMostrar;
                    document.getElementById('resUbicacion').innerText = ubicacionMostrar;

                    cerrarTeclado();
                    await reproducirSonidoConfirmacion();
                    modal.style.display = 'flex';
                    input.value = '';
                    actualizarHint();
                } else {
                    alert("No se encontró una cita para hoy con ese RUT.");
                    resetearInputRUT();
                }
            } catch (error) {
                console.error(error);
                alert("Error al procesar.");
                resetearInputRUT();
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Llegada";
                btnConfirmarTeclado.disabled = false;
            }
        }

        input.addEventListener('click', () => {
            inicializarAudio();
            abrirTeclado();
        });

        input.addEventListener('touchstart', () => {
            inicializarAudio();
            abrirTeclado();
        }, { passive: true });

        keyboardBackdrop.addEventListener('click', () => {
            cerrarTeclado();
        });

        btnOcultarTeclado.addEventListener('click', cerrarTeclado);
        btnCerrarTeclado.addEventListener('click', cerrarTeclado);

        btnBorrar.addEventListener('click', () => {
            inicializarAudio();
            borrarUltimoCaracter();
        });

        btnLimpiar.addEventListener('click', () => {
            inicializarAudio();
            limpiarCampo();
        });

        btnConfirmarTeclado.addEventListener('click', async () => {
            inicializarAudio();
            await procesarLlegada();
        });

        keyButtons.forEach(btnKey => {
            btnKey.addEventListener('click', () => {
                inicializarAudio();
                insertarCaracter(btnKey.dataset.key);
            });
        });

        btn.addEventListener('click', async () => {
            inicializarAudio();
            await procesarLlegada();
        });

        window.cerrarModal = () => {
            modal.style.display = 'none';
            resetearInputRUT();
        };

        window.addEventListener('load', () => {
            inicializarAudio();
            actualizarHint();
            setTimeout(() => {
                abrirTeclado();
            }, 250);
        });
    </script>

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch((error) => {
                    console.error("Error registrando service worker:", error);
                });
            });
        }
    </script>
</body>
</html>
