<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tótem de Atención - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#1c1c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <main class="app-shell">
        <section class="totem-screen">
            <header class="topbar">
                <div class="brand-area">
                    <div class="brand-mark"></div>

                    <div class="brand-text">
                        <span class="brand-name">CLÍNICA</span>
                        <span class="brand-sub">Sistema de atención</span>
                    </div>
                </div>

                <div class="topbar-right">
                    <div class="datetime-box">
                        <div class="datetime-row">
                            <span class="datetime-icon">📅</span>
                            <span id="fechaActual">--/--/----</span>
                        </div>

                        <div class="datetime-row">
                            <span class="datetime-icon">🕒</span>
                            <span id="horaActual">--:--</span>
                        </div>
                    </div>
                </div>
            </header>

            <section class="hero-block">
                <h1>Bienvenido</h1>
                <p class="hero-title">Su atención comienza aquí</p>
                <p class="hero-subtitle">
                    Ingrese su RUT para confirmar su llegada y comenzar el proceso de atención.
                </p>
            </section>

            <section class="checkin-panel">
                <div class="rut-display-wrap">
                    <label class="rut-label" for="rutInput">RUT DEL PACIENTE</label>

                    <div class="rut-input-box">
                        <div class="rut-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 12c2.761 0 5-2.462 5-5.5S14.761 1 12 1 7 3.462 7 6.5 9.239 12 12 12Z" stroke="currentColor" stroke-width="2"/>
                                <path d="M3 22c0-4.418 4.03-8 9-8s9 3.582 9 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>

                        <input
                            type="text"
                            id="rutInput"
                            placeholder="12.345.678-K"
                            autocomplete="off"
                            autocapitalize="characters"
                            maxlength="12"
                            inputmode="none"
                            readonly
                        >
                    </div>
                </div>

                <div class="keypad-wrap">
                    <div class="keypad">
                        <button type="button" class="key key-number" data-key="1">1</button>
                        <button type="button" class="key key-number" data-key="2">2</button>
                        <button type="button" class="key key-number" data-key="3">3</button>

                        <button type="button" class="key key-number" data-key="4">4</button>
                        <button type="button" class="key key-number" data-key="5">5</button>
                        <button type="button" class="key key-number" data-key="6">6</button>

                        <button type="button" class="key key-number" data-key="7">7</button>
                        <button type="button" class="key key-number" data-key="8">8</button>
                        <button type="button" class="key key-number" data-key="9">9</button>

                        <button type="button" class="key key-letter" data-key="K">K</button>
                        <button type="button" class="key key-number" data-key="0">0</button>

                        <button type="button" class="key key-delete" id="btnBorrar" aria-label="Borrar último carácter">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M10 6H20C21.1046 6 22 6.89543 22 8V16C22 17.1046 21.1046 18 20 18H10L2 12L10 6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M13 10L17 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M17 10L13 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-confirm" id="btnConfirmar" type="button">
                        <span>Confirmar llegada</span>
                        <span class="btn-arrow">→</span>
                    </button>
                </div>
            </section>
        </section>
    </main>

    <div class="modal-overlay" id="modalConfirmacion">
        <div class="modal-content">
            <div class="modal-icon success-icon">✓</div>
            <h2 id="modalTitulo" class="success">LLEGADA CONFIRMADA</h2>

            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Paciente</span>
                    <span class="info-value" id="resNombre">---</span>
                </div>

                <div class="info-item">
                    <span class="info-label">Médico</span>
                    <span class="info-value" id="resDoctor">---</span>
                </div>

                <div class="info-item">
                    <span class="info-label">Ubicación</span>
                    <span class="info-value" id="resUbicacion">---</span>
                </div>
            </div>

            <p id="modalMensaje">POR FAVOR, DIRÍJASE A RECEPCIÓN.</p>

            <button class="btn-close" id="btnCerrarModal" type="button">ENTENDIDO</button>
        </div>
    </div>

    <div class="alert-overlay" id="customAlert">
        <div class="alert-text" id="customAlertText"></div>
    </div>

    <audio id="modalSound" preload="auto">
        <source src="./modal.mp3" type="audio/mpeg">
    </audio>

    <audio id="alertSound" preload="auto">
        <source src="./alert.mp3" type="audio/mpeg">
    </audio>

    <script type="module" src="./index.js"></script>

    <!--
    SERVICE WORKER DESACTIVADO TEMPORALMENTE PARA DESARROLLO
    Cuando quieras volver a activarlo, descomenta este bloque.

    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js").catch((error) => {
                    console.error("Error registrando service worker:", error);
                });
            });
        }
    </script>
    -->
</body>
</html>
