<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tótem de Autoatención - Bienvenida</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #4a4a4a;      
            --bg-card: #1c1c1c;      
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4;  
            --green-accent: #1DB954;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .totem-container {
            background-color: var(--bg-card);
            padding: 60px 40px;
            border-radius: var(--radius);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin-bottom: 10px; 
            letter-spacing: -1.5px; 
        }

        p { 
            color: var(--text-muted); 
            font-size: 1.1rem; 
            margin-bottom: 40px; 
        }

        .input-group {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            color: white;
            font-size: 1.8rem; /* Más grande para que el RUT luzca */
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
            font-weight: 700;
        }

        input:focus {
            border-color: var(--blue-accent);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Botón con el azul mate exacto */
        .btn-confirm {
            width: 100%;
            padding: 22px;
            background-color: var(--blue-accent);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .btn-confirm:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .success-msg {
            color: var(--green-accent);
            font-weight: 700;
            margin-top: 25px;
            display: none;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="totem-container">
        <h1>Bienvenido</h1>
        <p>Ingrese su RUT para anunciar su llegada</p>

        <div class="input-group">
            <input type="text" id="rutInput" placeholder="12.345.678-K" maxlength="12">
        </div>

        <button class="btn-confirm" id="confirmBtn">Confirmar Llegada</button>
        <div id="success-text" class="success-msg">✔ Llegada registrada correctamente</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const rutInput = document.getElementById('rutInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const successText = document.getElementById('success-text');

        // FUNCIÓN PARA FORMATEAR RUT AUTOMÁTICAMENTE (12.345.678-K)
        rutInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\./g, '').replace(/-/g, '').toUpperCase();
            if (value.length > 1) {
                let cv = value.slice(0, -1);
                let dv = value.slice(-1);
                value = cv.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + dv;
            }
            e.target.value = value;
        });

        confirmBtn.addEventListener('click', async () => {
            // Limpiamos el RUT para buscar en la base de datos (solo números y letra)
            let rawRut = rutInput.value.replace(/[.-]/g, '').toUpperCase();
            
            if (rawRut.length < 8) {
                alert("Por favor ingrese un RUT válido.");
                return;
            }

            try {
                const q = query(collection(db, "agendados"), where("rut", "==", rawRut));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    alert("No se encontró una cita agendada para este RUT hoy.");
                    return;
                }

                const ahora = new Date();
                const horaLlegada = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

                querySnapshot.forEach(async (docSnap) => {
                    await updateDoc(doc(db, "agendados", docSnap.id), {
                        estado: "llegado",
                        hora_llegada: horaLlegada
                    });
                });

                successText.style.display = "block";
                rutInput.value = "";
                
                setTimeout(() => { successText.style.display = "none"; }, 5000);

            } catch (error) {
                console.error("Error:", error);
                alert("Error al registrar llegada.");
            }
        });
    </script>
</body>
</html>
