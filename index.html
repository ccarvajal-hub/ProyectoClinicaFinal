<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tótem de Atención - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">

    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#1c1c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Cache busting -->
    <link rel="stylesheet" href="./index.css?v=20260411-02">
</head>
<body>
    <main class="app-shell">
        <section class="totem-screen">
            <header class="topbar">
                <div class="topbar-right">
                    <div class="datetime-box">
                        <div class="datetime-row">
                            <span class="datetime-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <rect x="4" y="5" width="16" height="15" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                                    <path d="M8 3.8V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                    <path d="M16 3.8V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                    <path d="M4 9H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </span>
                            <span id="fechaActual">--/--/----</span>
                        </div>

                        <div class="datetime-row">
                            <span class="datetime-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
                                    <path d="M12 7.8V12L15.2 13.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                            <span id="horaActual">--:--</span>
                        </div>
                    </div>
                </div>
            </header>

            <section class="hero-block">
                <h1 class="hero-main-title">
                    <span>Bienvenido a Clínica CEOLA,</span>
                    <span>tu atención comienza aquí.</span>
                </h1>

                <p class="hero-subtitle">
                    <span>Ingresa tu RUT para confirmar tu llegada</span>
                    <span>y comenzar el proceso de atención.</span>
                </p>
            </section>

            <section class="checkin-panel">
                <div class="rut-display-wrap">
                    <label class="rut-label" for="rutInput">RUT DEL PACIENTE</label>

                    <div class="rut-input-box">
                        <div class="rut-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="5" width="18" height="14" rx="3" stroke="currentColor" stroke-width="2"/>
                                <circle cx="8" cy="12" r="2.2" stroke="currentColor" stroke-width="1.8"/>
                                <path d="M12.5 10H17.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M12.5 14H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>

                        <input
                            type="text"
                            id="rutInput"
                            placeholder="12.345.678-K"
                            autocomplete="off"
                            autocapitalize="characters"
                            maxlength="12"
                            inputmode="none"
                            readonly
                        >
                    </div>
                </div>

                <div class="keypad-wrap">
                    <div class="keypad">
                        <button type="button" class="key key-number" data-key="1">1</button>
                        <button type="button" class="key key-number" data-key="2">2</button>
                        <button type="button" class="key key-number" data-key="3">3</button>

                        <button type="button" class="key key-number" data-key="4">4</button>
                        <button type="button" class="key key-number" data-key="5">5</button>
                        <button type="button" class="key key-number" data-key="6">6</button>

                        <button type="button" class="key key-number" data-key="7">7</button>
                        <button type="button" class="key key-number" data-key="8">8</button>
                        <button type="button" class="key key-number" data-key="9">9</button>

                        <button type="button" class="key key-letter" data-key="K">K</button>
                        <button type="button" class="key key-number" data-key="0">0</button>

                        <button type="button" class="key key-delete" id="btnBorrar" aria-label="Borrar último carácter">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M10 6H20C21.1046 6 22 6.89543 22 8V16C22 17.1046 21.1046 18 20 18H10L2 12L10 6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                <path d="M13 10L17 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M17 10L13 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-confirm" id="btnConfirmar" type="button">
                        <span>CONFIRMAR LLEGADA</span>
                    </button>
                </div>
            </section>
        </section>
    </main>

    <!-- MODAL CONFIRMACIÓN / AVISOS / SELECCIÓN -->
    <div class="modal-overlay" id="modalConfirmacion">
        <div class="modal-content">
            <div class="modal-icon success-icon">✓</div>
            <h2 id="modalTitulo" class="success">LLEGADA CONFIRMADA</h2>

            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Paciente</span>
                    <span class="info-value" id="resNombre">---</span>
                </div>

                <div class="info-item">
                    <span class="info-label">Médico</span>
                    <span class="info-value" id="resDoctor">---</span>
                </div>

                <div class="info-item">
                    <span class="info-label">Ubicación</span>
                    <span class="info-value" id="resUbicacion">---</span>
                </div>
            </div>

            <p id="modalMensaje">POR FAVOR, DIRÍJASE A RECEPCIÓN.</p>
            <div id="modalExtraContent"></div>

            <button class="btn-close" id="btnCerrarModal" type="button">ENTENDIDO</button>
        </div>
    </div>

    <div class="alert-overlay" id="customAlert">
        <div class="alert-text" id="customAlertText"></div>
    </div>

    <audio id="modalSound" preload="auto">
        <source src="./modal.mp3" type="audio/mpeg">
    </audio>

    <audio id="alertSound" preload="auto">
        <source src="./alert.mp3" type="audio/mpeg">
    </audio>

    <div id="appVersion" class="app-version">v---</div>

    <!-- PRIMERO INTENTA ONLINE -->
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.6.0/dist/easy.qrcode.min.js"></script>

    <!-- SI FALLA ONLINE, USA LA COPIA LOCAL -->
    <script>
        if (typeof QRCode === "undefined") {
            document.write('<script src="./js/qrcode.min.js"><\/script>');
        }
    </script>

    <!-- TU JS PRINCIPAL -->
    <script type="module" src="./index.js?v=20260411-02"></script>
</body>
</html>
