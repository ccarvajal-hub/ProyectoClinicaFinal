<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tótem de Atención - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#1c1c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root {
            --bg-page: #4a4a4a;
            --bg-card: #1c1c1c;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4;
            --green-muted: #2D6A4F;
            --yellow-accent: #FFB347;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        .totem-card {
            background-color: var(--bg-card);
            padding: 60px 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .instruction {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 24px;
            background: #2a2a2a;
            border: 2px solid var(--border-color);
            border-radius: 18px;
            color: white;
            font-size: 1.8rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            font-weight: 700;
        }

        .btn-confirm {
            width: 100%;
            padding: 22px;
            background-color: var(--blue-accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 25px;
        }

        .btn-confirm:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 45px;
            border-radius: var(--radius);
            border: 1px solid #333;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        #modalTitulo {
            font-size: 1.8rem;
            margin: 0 0 25px 0;
            font-weight: 800;
        }

        #modalTitulo.success {
            color: #48BB78;
        }

        #modalTitulo.warning {
            color: var(--yellow-accent);
        }

        .info-box {
            background: #252525;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .info-item:last-child {
            margin-bottom: 0;
            border: none;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            display: block;
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
        }

        #modalMensaje {
            color: var(--text-main);
            margin-bottom: 25px;
            font-size: 1.15rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.35;
        }

        #resUbicacion {
            text-transform: uppercase;
        }

        .btn-close {
            background: var(--green-muted);
            color: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .alert-overlay {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(28, 28, 28, 0.98);
            color: white;
            padding: 14px 22px;
            border-radius: 18px;
            border: 2px solid rgba(70, 130, 180, 0.55);
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
            z-index: 2000;
            min-width: 320px;
            max-width: 90vw;
            text-align: center;
            display: none;
        }

        .alert-overlay.show {
            display: block;
        }

        .alert-text {
            font-size: 0.92rem;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <div class="totem-card">
        <h1>Bienvenido</h1>
        <p class="instruction">Ingrese su RUT para confirmar su llegada.</p>
        <input
            type="text"
            id="rutInput"
            placeholder="12.345.678-K"
            autocomplete="off"
            autocapitalize="characters"
            maxlength="12"
        >
        <button class="btn-confirm" id="btnConfirmar">Confirmar Llegada</button>
    </div>

    <div class="modal-overlay" id="modalConfirmacion">
        <div class="modal-content">
            <h2 id="modalTitulo" class="success">LLEGADA CONFIRMADA</h2>
            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Paciente</span>
                    <span class="info-value" id="resNombre">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Médico</span>
                    <span class="info-value" id="resDoctor">---</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Ubicación</span>
                    <span class="info-value" id="resUbicacion">---</span>
                </div>
            </div>
            <p id="modalMensaje">POR FAVOR, DIRÍJASE A RECEPCIÓN.</p>
            <button class="btn-close" onclick="cerrarModal()">ENTENDIDO</button>
        </div>
    </div>

    <div class="alert-overlay" id="customAlert">
        <div class="alert-text" id="customAlertText"></div>
    </div>

    <audio id="modalSound" preload="auto">
        <source src="./modal.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const input = document.getElementById('rutInput');
        const modal = document.getElementById('modalConfirmacion');
        const btn = document.getElementById('btnConfirmar');
        const modalTitulo = document.getElementById('modalTitulo');
        const modalMensaje = document.getElementById('modalMensaje');
        const customAlert = document.getElementById('customAlert');
        const customAlertText = document.getElementById('customAlertText');
        const modalSound = document.getElementById('modalSound');

        let resetTimer = null;
        let modalTimer = null;
        let alertTimer = null;

        const MODAL_AUTO_CLOSE_MS = 12000;
        const ALERT_AUTO_CLOSE_MS = 8000;

        function limpiarRUT(rut) {
            return rut.replace(/[^0-9kK]/g, '').toUpperCase();
        }

        function formatearRUT(rut) {
            const limpio = limpiarRUT(rut).slice(0, 9);

            if (limpio.length <= 1) return limpio;

            const cuerpo = limpio.slice(0, -1);
            const dv = limpio.slice(-1);

            let cuerpoFormateado = '';
            let contador = 0;

            for (let i = cuerpo.length - 1; i >= 0; i--) {
                cuerpoFormateado = cuerpo[i] + cuerpoFormateado;
                contador++;

                if (contador === 3 && i !== 0) {
                    cuerpoFormateado = '.' + cuerpoFormateado;
                    contador = 0;
                }
            }

            return `${cuerpoFormateado}-${dv}`;
        }

        function validarRUT(rut) {
            rut = limpiarRUT(rut);

            if (!/^\d{7,8}[0-9K]$/.test(rut)) return false;

            const cuerpo = rut.slice(0, -1);
            const dvIngresado = rut.slice(-1);

            let suma = 0;
            let multiplo = 2;

            for (let i = cuerpo.length - 1; i >= 0; i--) {
                suma += parseInt(cuerpo[i], 10) * multiplo;
                multiplo = multiplo < 7 ? multiplo + 1 : 2;
            }

            const resto = suma % 11;
            const dvEsperadoNum = 11 - resto;

            let dvEsperado = '';
            if (dvEsperadoNum === 11) dvEsperado = '0';
            else if (dvEsperadoNum === 10) dvEsperado = 'K';
            else dvEsperado = String(dvEsperadoNum);

            return dvIngresado === dvEsperado;
        }

        function obtenerFechaHoyChile() {
            const partes = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Santiago',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).formatToParts(new Date());

            const year = partes.find(p => p.type === 'year').value;
            const month = partes.find(p => p.type === 'month').value;
            const day = partes.find(p => p.type === 'day').value;

            return `${year}-${month}-${day}`;
        }

        function horaATotalMinutos(hora) {
            if (!hora || typeof hora !== 'string') return 999999;

            const [hh, mm] = hora.split(':').map(Number);

            if (Number.isNaN(hh) || Number.isNaN(mm)) return 999999;

            return (hh * 60) + mm;
        }

        function normalizarEstado(estado) {
            return (estado || 'pendiente').toLowerCase().trim();
        }

        function seleccionarCitaCorrecta(docs) {
            const prioridadEstado = {
                pendiente: 0,
                agendado: 0,
                confirmado: 0,
                llegado: 1,
                en_recepcion: 1,
                pagado: 1,
                llamando: 1,
                llamado: 1,
                atendiendo: 1,
                atendido: 2
            };

            const citasValidas = docs
                .map(item => ({
                    doc: item,
                    data: item.data(),
                    estado: normalizarEstado(item.data().estado)
                }))
                .filter(item => item.estado in prioridadEstado);

            if (citasValidas.length === 0) return null;

            citasValidas.sort((a, b) => {
                const prioridadA = prioridadEstado[a.estado];
                const prioridadB = prioridadEstado[b.estado];

                if (prioridadA !== prioridadB) return prioridadA - prioridadB;

                const horaA = horaATotalMinutos(a.data.hora_consulta);
                const horaB = horaATotalMinutos(b.data.hora_consulta);

                return horaA - horaB;
            });

            return citasValidas[0].doc;
        }

        function cancelarResetInput() {
            if (resetTimer) {
                clearTimeout(resetTimer);
                resetTimer = null;
            }
        }

        function cancelarAutoCierreModal() {
            if (modalTimer) {
                clearTimeout(modalTimer);
                modalTimer = null;
            }
        }

        function cancelarAutoCierreAlert() {
            if (alertTimer) {
                clearTimeout(alertTimer);
                alertTimer = null;
            }
        }

        function resetearInputRUT() {
            cancelarResetInput();
            input.value = '';
            input.blur();
            }

        function programarResetInput() {
            cancelarResetInput();

            if (!input.value.trim()) return;
            if (btn.disabled) return;
            if (modal.style.display === 'flex') return;

            resetTimer = setTimeout(() => {
                if (!btn.disabled && modal.style.display !== 'flex') {
                    input.value = '';
                    input.focus();
                }
            }, 10000);
        }

        function mostrarAlerta(mensaje) {
            cancelarAutoCierreAlert();
            customAlertText.textContent = mensaje;
            customAlert.classList.add('show');

            alertTimer = setTimeout(() => {
                ocultarAlerta();
            }, ALERT_AUTO_CLOSE_MS);
        }

        function ocultarAlerta() {
            cancelarAutoCierreAlert();
            customAlert.classList.remove('show');
        }

        function reproducirSonidoModal() {
            if (!modalSound) return;

            modalSound.currentTime = 0;
            modalSound.play().catch(() => {
                console.warn('No se pudo reproducir el sonido del modal.');
            });
        }

        async function obtenerDatosDoctor(doctorId) {
            let nombreDoctorMostrar = "No asignado";
            let ubicacionMostrar = "Por confirmar";

            if (!doctorId) {
                return { nombreDoctorMostrar, ubicacionMostrar };
            }

            const idBuscado = doctorId.trim().toLowerCase();
            const docRefDoc = doc(db, "doctores", idBuscado);
            const docSnapDoc = await getDoc(docRefDoc);

            if (docSnapDoc.exists()) {
                const dData = docSnapDoc.data();
                nombreDoctorMostrar = dData.nombre || "No asignado";
                ubicacionMostrar = `Piso ${dData.piso} - Consulta ${dData.consulta}`;
            } else {
                nombreDoctorMostrar = "Dr(a). " + idBuscado.split('@')[0].toUpperCase();
            }

            return { nombreDoctorMostrar, ubicacionMostrar };
        }

        function abrirModal({ titulo, tipo, mensaje, nombre, doctor, ubicacion, autoClose = true }) {
            cancelarAutoCierreModal();
            ocultarAlerta();

            modalTitulo.textContent = titulo;
            modalTitulo.className = tipo;

            document.getElementById('resNombre').innerText = nombre || '---';
            document.getElementById('resDoctor').innerText = doctor || '---';
            document.getElementById('resUbicacion').innerText = (ubicacion || '---').toUpperCase();
            modalMensaje.textContent = (mensaje || '').toUpperCase();

            modal.style.display = 'flex';
            input.value = '';

            reproducirSonidoModal();

            if (autoClose) {
                modalTimer = setTimeout(() => {
                    cerrarModal();
                }, MODAL_AUTO_CLOSE_MS);
            }
        }

        async function buscarCitasHoyPorRut(rutLimpio, fechaHoy) {
            const resultados = [];
            const idsVistos = new Set();

            const variantesRUT = [rutLimpio];

            if (rutLimpio.endsWith('K')) {
                variantesRUT.push(rutLimpio.slice(0, -1) + 'k');
            }

            for (const rutVariante of variantesRUT) {
                const q = query(
                    collection(db, "agendados"),
                    where("rut", "==", rutVariante),
                    where("fecha_turno", "==", fechaHoy)
                );

                const querySnapshot = await getDocs(q);

                querySnapshot.forEach((docSnap) => {
                    if (!idsVistos.has(docSnap.id)) {
                        idsVistos.add(docSnap.id);
                        resultados.push(docSnap);
                    }
                });
            }

            return resultados;
        }

        input.addEventListener('input', () => {
            input.value = formatearRUT(input.value);
            programarResetInput();
        });

        input.addEventListener('focus', () => {
            if (input.value.trim()) {
                programarResetInput();
            }
        });

       btn.addEventListener('click', async () => {
            cancelarResetInput();
            ocultarAlerta();
            input.blur();

            const rutLimpio = limpiarRUT(input.value);
            if (!rutLimpio) {
                resetearInputRUT();
                return;
            }

            if (!validarRUT(rutLimpio)) {
                mostrarAlerta("RUT INVÁLIDO. VERIFIQUE E INTENTE NUEVAMENTE.");
                resetearInputRUT();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
                const fechaHoy = obtenerFechaHoyChile();
                const citasHoy = await buscarCitasHoyPorRut(rutLimpio, fechaHoy);

                if (citasHoy.length === 0) {
                    mostrarAlerta("NO SE ENCONTRÓ UNA CITA PARA HOY CON ESE RUT.");
                    resetearInputRUT();
                    return;
                }

                const citaSeleccionada = seleccionarCitaCorrecta(citasHoy);

                if (!citaSeleccionada) {
                    mostrarAlerta("NO SE ENCONTRÓ UNA CITA VÁLIDA PARA HOY CON ESE RUT.");
                    resetearInputRUT();
                    return;
                }

                const docSnap = citaSeleccionada;
                const p = docSnap.data();
                const estadoActual = normalizarEstado(p.estado);
                const { nombreDoctorMostrar, ubicacionMostrar } = await obtenerDatosDoctor(p.doctor_id);

                if (estadoActual === 'llegado') {
                    mostrarAlerta("SU LLEGADA YA FUE REGISTRADA.");
                    resetearInputRUT();
                    return;
                }

                if (estadoActual === 'atendido') {
                    abrirModal({
                        titulo: 'ATENCIÓN REALIZADA',
                        tipo: 'warning',
                        mensaje: 'SU ATENCIÓN DE HOY YA FUE REALIZADA.',
                        nombre: p.nombre,
                        doctor: nombreDoctorMostrar,
                        ubicacion: ubicacionMostrar
                    });
                    return;
                }

                const estadosYaRegistrados = ['en_recepcion', 'pagado', 'llamando', 'llamado', 'atendiendo'];

                if (estadosYaRegistrados.includes(estadoActual)) {
                    mostrarAlerta("SU LLEGADA YA FUE REGISTRADA.");
                    resetearInputRUT();
                    return;
                }

                const estadosInicialesValidos = ['pendiente', 'agendado', 'confirmado'];

                if (!estadosInicialesValidos.includes(estadoActual)) {
                    mostrarAlerta("NO SE ENCONTRÓ UNA CITA VÁLIDA PARA HOY CON ESE RUT.");
                    resetearInputRUT();
                    return;
                }

                const ahora24 = new Date().toLocaleTimeString('es-CL', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });

                await updateDoc(doc(db, "agendados", docSnap.id), {
                    estado: "llegado",
                    hora_llegada: ahora24
                });

                abrirModal({
                    titulo: 'LLEGADA CONFIRMADA',
                    tipo: 'success',
                    mensaje: 'POR FAVOR, DIRÍJASE A RECEPCIÓN.',
                    nombre: p.nombre,
                    doctor: nombreDoctorMostrar,
                    ubicacion: ubicacionMostrar
                });

            } catch (error) {
                console.error(error);
                mostrarAlerta("ERROR AL PROCESAR.");
                resetearInputRUT();
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Llegada";
            }
        });

        window.cerrarModal = () => {
            cancelarAutoCierreModal();
            modal.style.display = 'none';
            resetearInputRUT();
        };

        window.addEventListener('load', () => {
            input.focus();
        });
    </script>

</body>
</html>
