<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kiosko de Check-in</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN (Usa tu API Key real)
        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts", 
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Algoritmo para validar RUT chileno
        function validarRUT(rut) {
            rut = rut.replace(/\./g, '').replace(/-/g, '');
            let cuerpo = rut.slice(0, -1);
            let dv = rut.slice(-1).toUpperCase();
            if (cuerpo.length < 7) return false;
            
            let suma = 0;
            let multiplo = 2;
            for (let i = cuerpo.length - 1; i >= 0; i--) {
                suma += multiplo * cuerpo.charAt(i);
                multiplo = (multiplo < 7) ? multiplo + 1 : 2;
            }
            let dvEsperado = 11 - (suma % 11);
            dvEsperado = (dvEsperado == 11) ? '0' : (dvEsperado == 10) ? 'K' : dvEsperado.toString();
            return dvEsperado === dv;
        }

        window.checkIn = async function() {
            const input = document.getElementById('rutInput');
            const rut = input.value.trim();
            
            // 1. Validar RUT
            if (!validarRUT(rut)) {
                alert("RUT MAL INGRESADO");
                input.value = ""; // Limpia si está malo
                input.focus();
                return;
            }

            try {
                const q = query(collection(db, "agendados"), where("rut", "==", rut));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const docSnap = snapshot.docs[0];
                    const data = docSnap.data();
                    
                    if (data.estado === "llegado") {
                        alert("Usted ya realizó su check-in.");
                    } else {
                        await updateDoc(docSnap.ref, { estado: "llegado" });
                        alert(`¡Bienvenido ${data.nombre}! \nDiríjase a: ${data.piso} - ${data.consulta}.`);
                    }
                } else {
                    alert("RUT no encontrado en la agenda.");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión.");
            } finally {
                // ESTA ES LA CLAVE: Limpiar siempre al terminar
                input.value = "";
                input.focus();
            }
        }
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f1f5f9; margin: 0; }
        .box { background: white; padding: 50px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        input { width: 100%; padding: 20px; font-size: 1.5rem; margin-bottom: 20px; border: 2px solid #ccc; border-radius: 10px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 20px; font-size: 1.5rem; background: #0f172a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:active { background: #334155; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #1e293b;">Bienvenido</h1>
        <p>Por favor, ingrese su RUT</p>
        <input type="text" id="rutInput" placeholder="12.345.678-9">
        <button onclick="checkIn()">CONFIRMAR LLEGADA</button>
    </div>
</body>
</html>
