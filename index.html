<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosko de Check-in</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f1f5f9; margin: 0; }
        .box { background: white; padding: 50px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        h1 { color: #1e293b; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #64748b; }
        input { width: 100%; padding: 25px; font-size: 2rem; margin-bottom: 25px; border: 2px solid #cbd5e1; border-radius: 15px; box-sizing: border-box; text-align: center; color: #1e293b; }
        input:focus { outline: none; border-color: #3b82f6; background: #f8fafc; }
        button { width: 100%; padding: 25px; font-size: 1.8rem; background: #0f172a; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { background: #334155; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="box">
        <h1>🏥 Bienvenido</h1>
        <p>Por favor, ingrese su RUT</p>
        <input type="text" id="rutInput" placeholder="12.345.678-9" spellcheck="false" autocomplete="off">
        <button id="btnCheckIn">CONFIRMAR LLEGADA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts", 
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Algoritmo de validación de RUT
        function validarRUT(rut) {
            rut = rut.replace(/\./g, '').replace(/-/g, '').trim();
            if (rut.length < 8) return false;
            let cuerpo = rut.slice(0, -1);
            let dv = rut.slice(-1).toUpperCase();
            
            let suma = 0;
            let multiplo = 2;
            for (let i = cuerpo.length - 1; i >= 0; i--) {
                suma += multiplo * cuerpo.charAt(i);
                multiplo = (multiplo < 7) ? multiplo + 1 : 2;
            }
            let dvEsperado = 11 - (suma % 11);
            dvEsperado = (dvEsperado == 11) ? '0' : (dvEsperado == 10) ? 'K' : dvEsperado.toString();
            return dvEsperado === dv;
        }

        // Función principal vinculada al botón
        async function checkIn() {
            const input = document.getElementById('rutInput');
            const rutOriginal = input.value.trim();
            const rutLimpio = rutOriginal.replace(/\./g, '').replace(/-/g, '').toUpperCase();
            
            if (!validarRUT(rutOriginal)) {
                alert("⚠️ RUT INVÁLIDO\nPor favor, verifique el número y el dígito.");
                input.value = "";
                input.focus();
                return;
            }

            try {
                // Buscamos en la colección "agendados"
                const q = query(collection(db, "agendados"), where("rut", "==", rutLimpio));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const docSnap = snapshot.docs[0];
                    const data = docSnap.data();
                    
                    if (data.estado === "llegado") {
                        alert(`Hola ${data.nombre}, ya registramos tu llegada anteriormente.`);
                    } else {
                        await updateDoc(docSnap.ref, { 
                            estado: "llegado",
                            horaLlegada: new Date().toLocaleTimeString() 
                        });
                        alert(`¡Bienvenido ${data.nombre}!\n\n📍 Diríjase a: ${data.piso} - ${data.consulta}.`);
                    }
                } else {
                    alert("RUT no encontrado en la agenda de hoy.\nPor favor, acérquese a recepción.");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión con el servidor.");
            } finally {
                input.value = "";
                input.focus();
            }
        }

        // Asignar el evento al botón
        document.getElementById('btnCheckIn').addEventListener('click', checkIn);
    </script>
</body>
</html>
