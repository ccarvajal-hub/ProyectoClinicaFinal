<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Control de Flujo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #4a4a4a;      
            --bg-card: #1c1c1c;      
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --color-recepcion: #FFB347; 
            --color-pagado: #48BB78;    
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 900px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        h2 { 
            font-size: 1.4rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-espera { color: var(--color-recepcion); }
        .title-atendidos { color: var(--color-pagado); }

        .row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .name { flex: 2; font-weight: 700; }
        .doc { flex: 1.5; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        .hora { flex: 0.8; font-weight: 600; text-align: center; }
        .actions { flex: 1; text-align: right; }

        .btn-pay {
            background-color: var(--color-pagado);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-disabled {
            background-color: #333;
            color: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-pay:not(.btn-disabled):hover { filter: brightness(1.1); transform: scale(1.05); }
        .check { color: var(--color-pagado); font-weight: 800; font-size: 1.2rem; }

        .empty-msg { color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="title-espera">● PACIENTES EN ESPERA (REGISTRO TÓTEM)</h2>
        <div id="lista-espera">
            <div class="empty-msg">Cargando agenda...</div>
        </div>
    </div>

    <div class="container" style="opacity: 0.9;">
        <h2 class="title-atendidos">✔ HISTORIAL DE PAGOS Y ATENCIÓN</h2>
        <div id="lista-atendidos">
            <div class="empty-msg">No hay movimientos registrados.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cache para nombres de doctores
        const cacheDoctores = {};

        async function obtenerNombreDoctor(email) {
            if (!email) return "DOCTOR";
            const cleanEmail = email.toLowerCase().trim();
            if (cacheDoctores[cleanEmail]) return cacheDoctores[cleanEmail];

            try {
                const docRef = doc(db, "doctores", cleanEmail);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const nombre = docSnap.data().nombre;
                    cacheDoctores[cleanEmail] = nombre;
                    return nombre;
                }
            } catch (e) { console.error("Error doctor:", e); }
            
            return cleanEmail.split('@')[0].toUpperCase();
        }

        const q = query(collection(db, "agendados"), orderBy("hora_consulta", "asc"));

        onSnapshot(q, async (snapshot) => {
            const esperaDiv = document.getElementById('lista-espera');
            const atendidosDiv = document.getElementById('lista-atendidos');
            
            esperaDiv.innerHTML = "";
            atendidosDiv.innerHTML = "";

            let contEspera = 0;
            let contAtendidos = 0;

            // Usamos for...of para poder usar await dentro
            for (const docSnap of snapshot.docs) {
                const p = docSnap.data();
                const id = docSnap.id;
                const estado = p.estado || 'pendiente';

                const esHistorial = (estado === 'pagado' || estado === 'llamando' || estado === 'atendiendo' || estado === 'atendido');
                const nombreRealDoctor = await obtenerNombreDoctor(p.doctor_id);

                const row = document.createElement('div');
                row.className = "row";
                
                let accionContenido = '';
                if (!esHistorial) {
                    if (estado === 'llegado') {
                        accionContenido = `<button class="btn-pay" onclick="confirmarPago('${id}', '${p.nombre}')">PAGAR</button>`;
                    } else {
                        accionContenido = `<button class="btn-pay btn-disabled" title="Esperando registro en Tótem">PAGAR</button>`;
                    }
                } else {
                    accionContenido = `<span class="check">✔</span>`;
                }

                row.innerHTML = `
                    <div class="name">${p.nombre}</div>
                    <div class="doc">Dr. ${nombreRealDoctor}</div>
                    <div class="hora">${p.hora_consulta}</div>
                    <div class="actions">${accionContenido}</div>
                `;

                if (esHistorial) {
                    atendidosDiv.appendChild(row);
                    contAtendidos++;
                } else {
                    esperaDiv.appendChild(row);
                    contEspera++;
                }
            }

            if(contEspera === 0) esperaDiv.innerHTML = '<div class="empty-msg">No hay pacientes pendientes.</div>';
            if(contAtendidos === 0) atendidosDiv.innerHTML = '<div class="empty-msg">No hay pagos registrados hoy.</div>';
        });

        window.confirmarPago = async (id, nombre) => {
            const respuesta = confirm(`¿Confirmar que el paciente ${nombre} ha realizado el pago?`);
            if (respuesta) {
                try {
                    await updateDoc(doc(db, "agendados", id), { estado: "pagado" });
                } catch (e) {
                    alert("Error al procesar: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
