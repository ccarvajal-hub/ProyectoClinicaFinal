<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recepción - Control de Flujo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="recepcion.css" />
</head>
<body>
    <div class="page-header">
        <h1 id="recepcion-page-title">AGENDA RECEPCIONISTA</h1>
        <div class="page-subtitle" id="recepcion-page-subtitle">MÓDULO: RECEPCIÓN 1</div>
    </div>

    <div class="container container-pacientes">
        <div class="topbar">
            <div>
                <h2 class="title-espera">● PACIENTES EN RECEPCIÓN</h2>
                <div class="subinfo" id="fecha-hoy">Cargando fecha...</div>
            </div>

            <div class="topbar-right">
                <button class="btn-logout" id="btn-cerrar-sesion">Cerrar sesión</button>
            </div>
        </div>

        <div class="buscador-wrap">
            <input
                type="text"
                id="buscador-pacientes"
                class="buscador-pacientes"
                placeholder="BUSCAR PACIENTE POR NOMBRE O RUT"
                autocomplete="off"
            />
        </div>

        <div class="row-espera header">
            <div>Paciente</div>
            <div>RUT</div>
            <div>Doctor</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Recepción</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Acción</div>
            <div class="header-center">Pago manual</div>
        </div>

        <div id="lista-espera">
            <div class="empty-msg">Cargando agenda...</div>
        </div>
    </div>

    <div class="container container-historial">
        <h2 class="title-atendidos">✔ HISTORIAL</h2>

        <div class="row-historial header">
            <div>Paciente</div>
            <div>RUT</div>
            <div>Doctor</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Recepción</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Resultado</div>
        </div>

        <div id="lista-atendidos">
            <div class="empty-msg">No hay movimientos registrados.</div>
        </div>
    </div>

    <script type="module" src="recepcion.js"></script>
</body>
</html>
