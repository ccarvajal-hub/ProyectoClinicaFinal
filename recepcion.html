<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recepción - Control de Flujo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="recepcion.css" />
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2 class="title-espera">● PACIENTES EN RECEPCIÓN</h2>
                <div class="subinfo" id="fecha-hoy">Cargando fecha...</div>
            </div>

            <div class="topbar-right">
                <div class="recepcion-actual" id="recepcion-actual-label">Módulo: Recepción 1</div>
                <button class="btn-logout" id="btn-cerrar-sesion">Cerrar sesión</button>
            </div>
        </div>

        <div class="row-espera header">
            <div>Paciente</div>
            <div>Doctor</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Recepción</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Acción</div>
            <div class="header-center">Pago directo</div>
        </div>

        <div id="lista-espera">
            <div class="empty-msg">Cargando agenda...</div>
        </div>
    </div>

    <div class="container" style="opacity: 0.96;">
        <h2 class="title-atendidos">✔ HISTORIAL</h2>

        <div class="row-historial header">
            <div>Paciente</div>
            <div>Doctor</div>
            <div class="header-center">Hora</div>
            <div class="header-center">Recepción</div>
            <div class="header-center">Estado</div>
            <div class="header-center">Resultado</div>
        </div>

        <div id="lista-atendidos">
            <div class="empty-msg">No hay movimientos registrados.</div>
        </div>
    </div>

    <script type="module" src="recepcion.js"></script>
</body>
</html>
