<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Recepción</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #333;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 1400px; /* Volvemos al ancho de la imagen */
            text-align: center;
        }

        h1 { font-size: 3rem; margin-bottom: 40px; }

        .header, .row {
            display: flex;
            justify-content:间;
            padding: 15px 0;
            border-bottom: 1px solid #444;
            font-size: 0.9rem;
        }

        .header {
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
            border-bottom: 2px solid #444;
        }

        /* Columnas originales */
        .col-paciente { flex: 2; text-align: left; padding-left: 20px; }
        .col-rut      { flex: 1.5; text-align: center; }
        .col-doctor   { flex: 1.5; text-align: center; }
        .col-cita     { flex: 1; text-align: center; }
        .col-estado   { flex: 1.5; text-align: center; }
        .col-accion   { flex: 1; text-align: right; padding-right: 20px; }

        .row { align-items: center; }

        .btn-pagar {
            background-color: #48BB78;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .status-llegado { color: #FFB347; font-weight: bold; }
        .status-pagado { color: #48BB78; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Panel de Recepción</h1>
        
        <div class="header">
            <div class="col-paciente">Paciente</div>
            <div class="col-rut">Rut</div>
            <div class="col-doctor">Doctor</div>
            <div class="col-cita">Cita</div>
            <div class="col-estado">Estado</div>
            <div class="col-accion">Acción</div>
        </div>

        <div id="lista-pacientes"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cache para no pedir el nombre del doctor muchas veces
        const doctoresCache = {};

        async function obtenerNombreDoctor(email) {
            if (!email) return "No asignado";
            if (doctoresCache[email]) return doctoresCache[email];
            
            try {
                const docRef = doc(db, "doctores", email.toLowerCase().trim());
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    doctoresCache[email] = docSnap.data().nombre;
                    return doctoresCache[email];
                }
            } catch (e) { console.error(e); }
            return email; 
        }

        window.pagarTurno = async (id) => {
            await updateDoc(doc(db, "agendados", id), { estado: 'pagado' });
        };

        onSnapshot(collection(db, "agendados"), async (snapshot) => {
            const lista = document.getElementById('lista-pacientes');
            lista.innerHTML = "";

            for (const docSnap of snapshot.docs) {
                const p = docSnap.data();
                if (p.estado === 'llegado' || p.estado === 'pagado') {
                    
                    const nombreDoc = await obtenerNombreDoctor(p.doctor_id);
                    const estadoTexto = p.estado === 'llegado' ? 'En Recepción' : 'Pagado';
                    const estadoClase = p.estado === 'llegado' ? 'status-llegado' : 'status-pagado';

                    const div = document.createElement('div');
                    div.className = 'row';
                    div.innerHTML = `
                        <div class="col-paciente"><b>${p.nombre}</b></div>
                        <div class="col-rut">${p.rut}</div>
                        <div class="col-doctor">${nombreDoc}</div>
                        <div class="col-cita">${p.hora_consulta || '--:--'}</div>
                        <div class="col-estado <span class="${estadoClase}">${estadoTexto}</span></div>
                        <div class="col-accion">
                            ${p.estado === 'llegado' ? `<button class="btn-pagar" onclick="pagarTurno('${docSnap.id}')">PAGAR</button>` : ''}
                        </div>
                    `;
                    lista.appendChild(div);
                }
            }
        });
    </script>
</body>
</html>
