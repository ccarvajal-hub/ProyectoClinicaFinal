<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Ticket Digital - Clínica CEMO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./pase-paciente.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="ticket-shell">
    <section class="ticket-card">
      <div class="top-badge">CLÍNICA CEMO</div>

      <header class="hero">
        <h1 class="ticket-title">TICKET DIGITAL</h1>
        <p class="ticket-subtitle">Revisa tu estado actual en tiempo real</p>
      </header>

      <section class="notification-card">
        <button id="btn-notificacion" class="btn-notify" type="button">
          ACTIVAR NOTIFICACION DE LLAMADO
        </button>
      </section>

      <section class="summary-grid">
        <article class="info-box info-box-combined">
          <div class="info-combined-row paciente-row">
            <span class="info-label">Paciente</span>
            <div id="paciente-nombre" class="info-value info-value-patient">
              Cargando...
            </div>
          </div>

          <div class="info-combined-row">
            <span class="info-label">Doctor</span>
            <div id="doctor-nombre" class="info-value">--</div>
          </div>

          <div class="info-combined-row">
            <span class="info-label">Ubicación</span>
            <div id="ubicacion-texto" class="info-value">--</div>
          </div>
        </article>
      </section>

      <section class="current-status-card">
        <div class="status-card-header">
          <span class="status-card-label">ESTADO ACTUAL</span>
          <div id="estado-chip" class="estado-chip estado-espera">
            EN ESPERA
          </div>
        </div>

        <div id="estado-mensaje" class="estado-mensaje">
          Estamos preparando tu atención. Mantente atento a los próximos llamados.
        </div>

        <div class="status-actions">
          <div class="approx-time-box">
            <span class="approx-time-label">TIEMPO APROXIMADO</span>
            <span id="tiempo-estimado" class="approx-time-value">Calculando...</span>
          </div>

          <span id="ultima-actualizacion" class="last-update">
            Última actualización: --
          </span>
        </div>
      </section>

      <section class="timeline-card">
        <div class="timeline-header">
          <span class="timeline-label">PROGRESO</span>
        </div>

        <div id="timeline-steps" class="timeline-steps"></div>
      </section>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./pase-paciente.js"></script>
</body>
</html>
