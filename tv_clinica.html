<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Llamado - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --accent: #4299E1;
            --text: #ffffff;
            --muted: #a0aec0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; height: 95vh; }

        /* Panel Izquierdo: Llamado Actual */
        .main-call {
            background: var(--card); border-radius: 30px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            border: 4px solid var(--accent); box-shadow: 0 0 50px rgba(66, 153, 225, 0.2);
        }
        .main-call h1 { font-size: 5rem; margin: 0; color: var(--accent); text-transform: uppercase; }
        .main-call .paciente { font-size: 7rem; font-weight: 900; margin: 20px 0; line-height: 1; }
        .main-call .doctor-info { font-size: 2.5rem; font-weight: 700; color: #FFB347; text-transform: uppercase; }
        .main-call .box-info { font-size: 2rem; color: var(--muted); margin-top: 10px; }

        /* Panel Derecho: Historial */
        .history { background: rgba(255,255,255,0.05); border-radius: 30px; padding: 30px; }
        .history h2 { font-size: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .hist-row {
            display: grid; grid-template-columns: 1fr auto;
            background: rgba(0,0,0,0.2); padding: 15px 20px;
            border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--accent);
        }
        .hist-name { font-weight: 700; font-size: 1.4rem; text-transform: uppercase; }
        .hist-doc { font-size: 1.1rem; color: #FFB347; font-weight: 600; }
        .hist-meta { font-size: 1.2rem; color: #48BB78; font-weight: 800; text-align: right; }

        .flash { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="layout">
        <div class="main-call" id="container-llamado">
            <h1>Llamando a:</h1>
            <div class="paciente" id="tv-paciente">---</div>
            <div class="doctor-info" id="tv-doctor">ESPERANDO...</div>
            <div class="box-info" id="tv-box">---</div>
        </div>

        <div class="history">
            <h2>Últimos llamados</h2>
            <div id="historial-lista"></div>
        </div>
    </div>

    <audio id="snd"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const cacheDoctores = {};
        let ultimoId = "";

        async function infoDoc(email) {
            if (!email) return { nombre: "DOCTOR", consulta: "---" };
            if (cacheDoctores[email]) return cacheDoctores[email];
            const d = await getDoc(doc(db, "doctores", email.toLowerCase().trim()));
            if (d.exists()) {
                cacheDoctores[email] = { nombre: d.data().nombre, consulta: d.data().consulta };
                return cacheDoctores[email];
            }
            return { nombre: email.split('@')[0], consulta: "---" };
        }

        onSnapshot(doc(db, "turnos", "actual"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.paciente !== ultimoId) {
                    document.getElementById('snd').play();
                    document.getElementById('container-llamado').classList.add('flash');
                    setTimeout(() => document.getElementById('container-llamado').classList.remove('flash'), 5000);
                    ultimoId = data.paciente;
                }
                document.getElementById('tv-paciente').innerText = data.paciente;
                document.getElementById('tv-doctor').innerText = data.doctor;
                document.getElementById('tv-box').innerText = data.box;
            }
        });

        const q = query(collection(db, "agendados"), where("estado", "in", ["atendiendo", "atendido"]), limit(5));
        onSnapshot(q, async (snapshot) => {
            const lista = document.getElementById('historial-lista');
            lista.innerHTML = "";
            for (const docSnap of snapshot.docs) {
                const p = docSnap.data();
                const d = await infoDoc(p.doctor_id);
                const row = document.createElement('div');
                row.className = "hist-row";
                row.innerHTML = `
                    <div>
                        <div class="hist-name">${p.nombre}</div>
                        <div class="hist-doc">${d.nombre}</div>
                    </div>
                    <div class="hist-meta">Consulta ${d.consulta}</div>
                `;
                lista.appendChild(row);
            }
        });
    </script>
</body>
</html>
