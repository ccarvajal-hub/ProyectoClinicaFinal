<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Llamado - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./tv.css" />
</head>
<body>

    <div id="audio-unlock">
        <h2>Sistema listo</h2>
        <p>Haz clic para activar sonido y pantalla</p>
    </div>

    <div id="app">
        <button id="btn-reset-tv" class="reset-tv-btn" type="button">
            Resetear TV
        </button>

        <div class="layout">
            <div class="main-call" id="container-llamado">
                <h1>Llamando a:</h1>
                <div class="paciente" id="tv-paciente">---</div>
                <div class="doctor-info" id="tv-recepcion">ESPERANDO...</div>
                <div class="box-info" id="tv-hora">---</div>
            </div>

            <div class="history">
                <h2>Últimos llamados</h2>
                <div id="historial-lista"></div>
            </div>
        </div>
    </div>

    <audio id="snd" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg" />
    </audio>

    <script type="module" src="./tv.js"></script>
</body>
</html>
