<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Llamado - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./tv.css" />
</head>
<body>

    <div id="audio-unlock">
        <h2>Sistema listo</h2>
        <p>Haz clic para activar sonido y pantalla</p>
    </div>

    <div class="tv-viewport">
        <div class="tv-portrait-frame">
            <div id="app" class="tv-app">
                <button id="btn-reset-tv" class="reset-tv-btn" type="button">
                    Resetear TV
                </button>

                <div class="tv-split">

                    <!-- BLOQUE DOCTOR -->
                    <section class="call-section doctor-section" id="section-doctor">
                        <div class="section-header doctor-header">
                            <h1>LLAMADO DOCTOR</h1>
                        </div>

                        <div class="section-layout">
                            <div class="main-call doctor-call" id="container-llamado-doctor">
                                <h2>Llamando a:</h2>
                                <div class="paciente" id="tv-doctor-paciente">---</div>
                                <div class="staff-info" id="tv-doctor-modulo">ESPERANDO...</div>
                                <div class="box-info" id="tv-doctor-hora">---</div>
                            </div>

                            <div class="history doctor-history">
                                <h3>Últimos llamados doctor</h3>
                                <div id="historial-doctor" class="historial-lista"></div>
                            </div>
                        </div>
                    </section>

                    <!-- BLOQUE RECEPCIÓN -->
                    <section class="call-section recepcion-section" id="section-recepcion">
                        <div class="section-header recepcion-header">
                            <h1>LLAMADO RECEPCIÓN</h1>
                        </div>

                        <div class="section-layout">
                            <div class="main-call recepcion-call" id="container-llamado-recepcion">
                                <h2>Llamando a:</h2>
                                <div class="paciente" id="tv-recepcion-paciente">---</div>
                                <div class="staff-info" id="tv-recepcion-modulo">ESPERANDO...</div>
                                <div class="box-info" id="tv-recepcion-hora">---</div>
                            </div>

                            <div class="history recepcion-history">
                                <h3>Últimos llamados recepción</h3>
                                <div id="historial-recepcion" class="historial-lista"></div>
                            </div>
                        </div>
                    </section>

                </div>
            </div>
        </div>
    </div>

    <audio id="snd" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg" />
    </audio>

    <script type="module" src="./tv.js"></script>
</body>
</html>
