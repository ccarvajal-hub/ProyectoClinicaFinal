<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Llamado - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --accent: #4299E1;
            --text: #ffffff;
            --muted: #a0aec0;
            --warning: #FFB347;
            --success: #48BB78;
            --safe-x: 1.4vw;
            --safe-y: 1.6vh;
            --radius: 1.6vh;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        #app {
            width: 100vw;
            height: 100vh;
            padding: var(--safe-y) var(--safe-x);
            overflow: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 1.72fr 0.78fr;
            gap: 1.2vw;
            width: 100%;
            height: 100%;
            min-height: 0;
            align-items: stretch;
        }

        #audio-unlock {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
            padding: 4vh 4vw;
        }

        #audio-unlock h2 {
            color: var(--accent);
            font-size: clamp(2rem, 4vw, 4.5rem);
            margin: 0 0 1rem 0;
            text-transform: uppercase;
        }

        #audio-unlock p {
            font-size: clamp(1rem, 2vw, 2rem);
            margin: 0;
            color: #fff;
        }

        .main-call {
            background: var(--card);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 0.2vw solid var(--accent);
            box-shadow: 0 0 2vw rgba(66, 153, 225, 0.14);
            padding: 2.2vh 1.8vw;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .main-call h1 {
            font-size: clamp(1.8rem, 3.4vw, 4.2rem);
            margin: 0;
            color: var(--accent);
            text-transform: uppercase;
            line-height: 1.05;
        }

        .main-call .paciente {
            font-size: clamp(3.2rem, 6vw, 6.6rem);
            font-weight: 900;
            margin: 1.6vh 0 1.2vh 0;
            line-height: 0.95;
            text-transform: uppercase;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .main-call .doctor-info {
            font-size: clamp(1.2rem, 2vw, 2.3rem);
            font-weight: 700;
            color: var(--warning);
            text-transform: uppercase;
            line-height: 1.1;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            text-align: center;
        }

        .main-call .box-info {
            font-size: clamp(1.1rem, 1.7vw, 2rem);
            color: var(--muted);
            margin-top: 1vh;
            text-transform: uppercase;
            font-weight: 800;
            line-height: 1.1;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            text-align: center;
        }

        .history {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 1.6vh 1vw;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .history h2 {
            font-size: clamp(1.1rem, 1.7vw, 2rem);
            border-bottom: 0.14vw solid var(--accent);
            padding-bottom: 0.8vh;
            margin: 0 0 1.2vh 0;
            text-transform: uppercase;
            flex: 0 0 auto;
        }

        #historial-lista {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
        }

        .hist-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.8vw;
            background: rgba(0, 0, 0, 0.22);
            padding: 1vh 0.8vw;
            border-radius: 1vh;
            border-left: 0.25vw solid var(--accent);
            animation: slideIn 0.5s ease-out;
            min-width: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hist-name {
            font-weight: 800;
            font-size: clamp(0.95rem, 1.4vw, 1.5rem);
            text-transform: uppercase;
            line-height: 1.08;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hist-doc {
            font-size: clamp(0.7rem, 0.9vw, 0.95rem);
            color: var(--warning);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 0.35vh;
            line-height: 1.1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hist-meta {
            font-size: clamp(0.9rem, 1.15vw, 1.2rem);
            color: var(--success);
            font-weight: 900;
            text-align: right;
            align-self: center;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .flash {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.015); }
            100% { transform: scale(1); }
        }

        /* Solo cambiar a 1 columna en pantallas realmente chicas o verticales */
        @media (max-width: 900px), (orientation: portrait) {
            .layout {
                grid-template-columns: 1fr;
                gap: 1.2vh;
            }

            .history {
                padding: 1.6vh 1.8vw;
            }

            .main-call {
                padding: 2vh 2vw;
            }
        }
    </style>
</head>
<body>

    <div id="audio-unlock" onclick="unlockAudio()">
        <h2>Sistema listo</h2>
        <p>Haz clic para activar sonido y pantalla</p>
    </div>

    <div id="app">
        <div class="layout">
            <div class="main-call" id="container-llamado">
                <h1>Llamando a:</h1>
                <div class="paciente" id="tv-paciente">---</div>
                <div class="doctor-info" id="tv-doctor">ESPERANDO...</div>
                <div class="box-info" id="tv-box">---</div>
            </div>

            <div class="history">
                <h2>Últimos llamados</h2>
                <div id="historial-lista"></div>
            </div>
        </div>
    </div>

    <audio id="snd" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg" />
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, limit, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const cacheDoctores = {};
        let ultimoPacienteLlamado = "";

        window.unlockAudio = () => {
            const audio = document.getElementById("snd");
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                document.getElementById("audio-unlock").style.display = "none";
            }).catch(() => {
                console.warn("No se pudo desbloquear el audio.");
            });
        };

        async function infoDoc(email) {
            if (!email) return { nombre: "DOCTOR", consulta: "---" };

            const cleanEmail = email.toLowerCase().trim();

            if (cacheDoctores[cleanEmail]) return cacheDoctores[cleanEmail];

            try {
                const d = await getDoc(doc(db, "doctores", cleanEmail));
                if (d.exists()) {
                    cacheDoctores[cleanEmail] = {
                        nombre: d.data().nombre || cleanEmail.split("@")[0],
                        consulta: d.data().consulta || "---"
                    };
                    return cacheDoctores[cleanEmail];
                }
            } catch (e) {
                console.warn("No se pudo obtener doctor:", e);
            }

            return {
                nombre: cleanEmail.split("@")[0],
                consulta: "---"
            };
        }

        onSnapshot(doc(db, "turnos", "actual"), (docSnap) => {
            if (!docSnap.exists()) return;

            const data = docSnap.data();
            const paciente = data.paciente || "---";
            const doctor = data.doctor ? "DR. " + data.doctor : "---";
            const box = data.box || "---";

            if (data.paciente && data.paciente !== ultimoPacienteLlamado) {
                const audio = document.getElementById("snd");
                audio.currentTime = 0;
                audio.volume = 1.0;
                audio.play().catch(() => {
                    console.warn("Audio bloqueado. Haz clic en la pantalla.");
                });

                const container = document.getElementById("container-llamado");
                container.classList.add("flash");
                setTimeout(() => container.classList.remove("flash"), 5000);

                ultimoPacienteLlamado = data.paciente;
            }

            document.getElementById("tv-paciente").innerText = paciente;
            document.getElementById("tv-doctor").innerText = doctor;
            document.getElementById("tv-box").innerText = box;
        });

        const qHist = query(
            collection(db, "agendados"),
            where("ultimo_llamado", ">", 0),
            orderBy("ultimo_llamado", "desc"),
            limit(6)
        );

        onSnapshot(qHist, async (snapshot) => {
            const lista = document.getElementById("historial-lista");
            lista.innerHTML = "";

            for (const docSnap of snapshot.docs) {
                const p = docSnap.data();
                const d = await infoDoc(p.doctor_id);

                const row = document.createElement("div");
                row.className = "hist-row";
                row.innerHTML = `
                    <div style="min-width:0;">
                        <div class="hist-name">${p.nombre || "---"}</div>
                        <div class="hist-doc">DR. ${d.nombre || "---"}</div>
                    </div>
                    <div class="hist-meta">CONSULTA ${d.consulta || "---"}</div>
                `;
                lista.appendChild(row);
            }
        }, (error) => {
            console.error("Error en Historial:", error);
        });
    </script>
</body>
</html>
