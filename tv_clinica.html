<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Llamados - Clínica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-sidebar: #262626;
            --bg-card: #333333;
            --text-main: #ffffff;
            --accent-blue: #4682B4;
            --accent-green: #48BB78;
            --radius: 30px;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        /* ÁREA PRINCIPAL: LLAMADO ACTUAL */
        #main-call {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            background-color: #111; /* Un poco más oscuro para resaltar */
            border-right: 1px solid #333;
            transition: background 0.5s ease;
        }

        .label-llamando {
            color: var(--accent-blue);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #p-nombre {
            font-size: 7.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 30px 0;
            text-transform: uppercase;
            word-wrap: break-word;
            max-width: 90%;
        }

        #p-box {
            font-size: 4.5rem;
            background-color: var(--accent-blue);
            color: white;
            padding: 15px 70px;
            border-radius: 20px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* SIDEBAR: HISTORIAL */
        #sidebar {
            flex: 0.8;
            background-color: var(--bg-sidebar);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
        }

        h3 {
            font-size: 1.8rem;
            color: #777;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        ul { list-style: none; padding: 0; margin: 0; }

        .history-item {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-left: 12px solid #444;
            animation: slideIn 0.5s ease-out;
        }

        .h-name { font-size: 1.8rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .h-box { font-size: 1.1rem; color: var(--accent-blue); font-weight: 800; text-transform: uppercase; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* EFECTO DE LLAMADO */
        .flash { background-color: #222 !important; }

        /* MODAL DE INICIO */
        #modal-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        #modal-inicio button {
            padding: 30px 60px;
            font-size: 2rem;
            background-color: var(--accent-green);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #modal-inicio button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="modal-inicio">
        <button onclick="comenzar()">ACTIVAR PANTALLA TV</button>
    </div>

    <div id="main-call">
        <div class="label-llamando">PACIENTE</div>
        <div id="p-nombre">---</div>
        <div id="p-box">---</div>
    </div>

    <div id="sidebar">
        <h3>Anteriores</h3>
        <ul id="lista-historial"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        let inicializado = false;
        let ultimoPaciente = "";

        // 1. ESCUCHAR LLAMADO ACTUAL
        onSnapshot(doc(db, "turnos", "actual"), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                
                // Solo si el nombre cambió, disparamos alerta
                if (data.paciente !== ultimoPaciente) {
                    document.getElementById('p-nombre').innerText = data.paciente;
                    document.getElementById('p-box').innerText = data.box;
                    
                    if (inicializado) {
                        // Sonido Ding
                        audio.play().catch(e => console.log("Interacción requerida"));
                        
                        // Efecto visual suave de parpadeo
                        const main = document.getElementById('main-call');
                        main.classList.add('flash');
                        setTimeout(() => main.classList.remove('flash'), 1000);
                    }
                    ultimoPaciente = data.paciente;
                    inicializado = true;
                }
            }
        });

        // 2. ESCUCHAR HISTORIAL (Últimos 4, saltando el actual si fuera necesario)
        // Nota: Asegúrate de que en Firebase se guarden en la colección 'historial'
        const q = query(collection(db, "agendados"), orderBy("hora_llamado", "desc"), limit(5));
        
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = "";
            
            let count = 0;
            snapshot.forEach((docSnap) => {
                const h = docSnap.data();
                // Filtramos para que solo aparezcan los que tienen estado 'llamando', 'atendiendo' o 'atendido'
                // Y que NO sea el paciente que se está mostrando actualmente en grande
                if ((h.estado === 'llamando' || h.estado === 'atendiendo' || h.estado === 'atendido') && h.nombre !== ultimoPaciente && count < 3) {
                    const item = document.createElement('li');
                    item.className = "history-item";
                    item.innerHTML = `
                        <span class="h-name">${h.nombre}</span>
                        <span class="h-box">${h.piso} - ${h.consulta}</span>
                    `;
                    lista.appendChild(item);
                    count++;
                }
            });
        });

        window.comenzar = () => {
            document.getElementById('modal-inicio').style.display = 'none';
            // Play de prueba para habilitar el audio en el navegador
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            });
        }
    </script>
</body>
</html>
