<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso Doctor - Clínica</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login-doctor.css">
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>Bienvenido</h1>
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input
                type="email"
                id="email"
                placeholder="doctor@clinica.cl"
                autocomplete="username"
            />
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <div class="password-wrap">
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                />
                <button type="button" id="togglePassword" class="toggle-password">Mostrar</button>
            </div>
        </div>

        <button id="btnLogin" type="button" class="btn-login">Iniciar sesión</button>

        <p class="small-note">
            Para iniciar sesión, tu usuario debe estar registrado en<br>
    <b>FIREBASE AUTHENTICATION</b>.
        </p>

        <div id="error-message" class="error-msg"></div>
        <div id="ok-message" class="ok-msg"></div>

        <div class="module-pill module-pill-bottom">MÓDULO DOCTOR</div>
    </div>

    <button id="btnModoDev" type="button" class="btn-dev-floating">Modo dev</button>

    <div id="devModal" class="dev-modal hidden">
        <div class="dev-modal-content">
            <div class="dev-modal-header">
                <h3>Seleccionar cuenta doctor</h3>
                <button type="button" id="btnCerrarDev" class="dev-close">×</button>
            </div>

            <div class="dev-account-list">
                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="doctor@clinica.cl"
                    data-password="123456"
                >
                    doctor@clinica.cl
                </button>

                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="ccarvajal@lyntec.cl"
                    data-password="123456"
                >
                    ccarvajal@lyntec.cl
                </button>

                <button
                    type="button"
                    class="dev-account-btn"
                    data-email="ssandoval@lyntec.cl"
                    data-password="123456"
                >
                    ssandoval@lyntec.cl
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="login-doctor.js"></script>
</body>
</html>
