<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Médicos - Agenda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="login-doctor.css">
</head>
<body>

    <div class="login-container">
        <h1>Bienvenido</h1>
        <p>Acceso al Panel Médico</p>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="doctor@clinica.cl" autocomplete="username">
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn">Iniciar Sesión</button>
        <div id="error-text" class="error-msg">Credenciales incorrectas</div>
    </div>

    <div class="dev-tools">
        <button class="btn-dev btn-seed" id="btnCrearPacientes">Crear Pacientes Test</button>
        <button class="btn-dev btn-reset" id="btnResetear">Reiniciar Jornada</button>
    </div>

    <script type="module" src="login-doctor.js"></script>
</body>
</html>
