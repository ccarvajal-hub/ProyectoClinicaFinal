<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Médico - Panel de Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Función de inicio de sesión
        window.iniciarSesion = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if (!email || !pass) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "doctor.html";
            } catch (error) { 
                alert("Error de acceso: Credenciales incorrectas."); 
            }
        };

        // Botón masivo para resetear pacientes
        window.resetearTodos = async () => {
            if(!confirm("¿Deseas reiniciar todos los pacientes a 'pendiente'?")) return;
            try {
                const querySnapshot = await getDocs(collection(db, "agendados"));
                const promesas = [];
                querySnapshot.forEach((docSnap) => {
                    promesas.push(updateDoc(docSnap.ref, { estado: "pendiente" }));
                });
                await Promise.all(promesas);
                alert("¡Listo! Agenda reiniciada.");
            } catch (e) {
                alert("Error al resetear: " + e.message);
            }
        };
    </script>

    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --blue-accent: #4682B4; 
            --orange-accent: #f59e0b;
            --input-bg: #2A2A2A;
            --input-border: #3E3E3E;
            --radius-box: 24px;
            --radius-input: 12px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px;
        }

        .box { 
            background: var(--bg-card); 
            padding: 50px 40px; 
            border-radius: var(--radius-box); 
            width: 100%;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h2 { font-size: 2.2rem; font-weight: 800; margin: 0 0 8px 0; letter-spacing: -1.5px; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; margin-top: 0; }

        input { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: var(--radius-input); 
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--blue-accent); }

        .btn-login { 
            background: var(--blue-accent); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: var(--radius-input); 
            margin-top: 15px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }

        .test-btn { 
            background: transparent;
            color: var(--orange-accent);
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 12px 20px; 
            border-radius: var(--radius-input); 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 25px;
            transition: all 0.2s;
        }
        .test-btn:hover { background: rgba(245, 158, 11, 0.1); border-color: var(--orange-accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h2>Bienvenido</h2>
            <p>Ingreso al panel médico</p>
            
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            
            <button class="btn-login" onclick="iniciarSesion()">INGRESAR</button>
        </div>
        
        <button class="test-btn" onclick="resetearTodos()">Reiniciar Agenda del Día</button>
    </div>

</body>
</html>
