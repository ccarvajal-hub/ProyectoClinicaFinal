<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Médico - Panel de Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FUNCIÓN 1: INICIAR SESIÓN
        window.iniciarSesion = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if (!email || !pass) {
                alert("Por favor, ingresa tu correo y contraseña.");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "doctor.html";
            } catch (error) { 
                alert("Error de acceso: Credenciales incorrectas."); 
            }
        };

        // --- GENERADORES ALEATORIOS PARA PRUEBAS ---
        const nombres = ["Juan", "María", "Pedro", "Ana", "Luis", "Carmen", "Diego", "Camila", "Jorge", "Valentina"];
        const apellidos = ["González", "Muñoz", "Rojas", "Díaz", "Pérez", "Soto", "Contreras", "Silva", "Martínez", "Sepúlveda"];

        function generarRutValido() {
            // Genera un número de RUT aleatorio entre 5.000.000 y 25.000.000
            let num = Math.floor(Math.random() * 20000000) + 5000000;
            let rut = num;
            let M = 0, S = 1;
            for (; rut; rut = Math.floor(rut / 10)) {
                S = (S + rut % 10 * (9 - M++ % 6)) % 11;
            }
            let dv = S ? S - 1 : 'k';
            return `${num}${dv}`; // Lo devuelve sin puntos ni guion para el formato que usas: ej. 14021549k
        }

        function generarFecha() {
            const year = Math.floor(Math.random() * (2005 - 1950 + 1)) + 1950;
            const month = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
            const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // FUNCIÓN 2: CREAR PACIENTE ALEATORIO Y VÁLIDO
        window.crearPrueba = async () => {
            const emailDoctor = document.getElementById('email').value;
            if(!emailDoctor) {
                alert("Escribe el correo del doctor arriba para saber a quién asignarle el paciente.");
                return;
            }

            const nombreRandom = `${nombres[Math.floor(Math.random() * nombres.length)]} ${apellidos[Math.floor(Math.random() * apellidos.length)]}`;
            const rutRandom = generarRutValido();
            const fechaRandom = generarFecha();

            try {
                await addDoc(collection(db, "agendados"), {
                    nombre: nombreRandom,
                    rut: rutRandom,
                    fecha_nacimiento: fechaRandom,
                    hora_consulta: "10:00",
                    piso: "PISO 2",
                    consulta: "BOX 5",
                    doctor_id: emailDoctor,
                    estado: "pendiente" // Lo dejamos en pendiente para que vayas al tótem a "llegar"
                });
                
                // Muestra la alerta con el RUT para que el usuario pueda probarlo en el Tótem
                alert(`¡Paciente Creado Exitosamente!\n\nNombre: ${nombreRandom}\nRUT: ${rutRandom}\n\nAnótalo para probar en el Tótem.`);
            } catch (e) { alert("Error al crear: " + e.message); }
        };

        // FUNCIÓN 3: REINICIAR TODA LA AGENDA
        window.resetearTodos = async () => {
            if(!confirm("¿Deseas reiniciar todos los estados a 'pendiente'?")) return;
            try {
                const querySnapshot = await getDocs(collection(db, "agendados"));
                const promesas = [];
                querySnapshot.forEach((docSnap) => {
                    promesas.push(updateDoc(docSnap.ref, { estado: "pendiente" }));
                });
                await Promise.all(promesas);
                alert("¡Agenda reiniciada con éxito!");
            } catch (e) { alert("Error al resetear: " + e.message); }
        };
    </script>

    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4; 
            --orange-accent: #f59e0b;
            --green-accent: #1DB954;
            --input-bg: #2A2A2A;
            --input-border: #3E3E3E;
            --radius-box: 32px;
            --radius-input: 16px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 550px; 
        }

        .box { 
            background: var(--bg-card); 
            padding: 60px 50px; 
            border-radius: var(--radius-box); 
            width: 100%;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        h2 { font-size: 2.6rem; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -2px; }
        p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; }

        input { 
            width: 100%; 
            padding: 22px; 
            margin-bottom: 15px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: var(--radius-input); 
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--blue-accent); background: #333; }

        .btn-login { 
            background: var(--blue-accent); 
            color: white; 
            border: none; 
            padding: 22px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: var(--radius-input); 
            margin-top: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }

        /* HERRAMIENTAS DE ABAJO */
        .admin-tools {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .tool-btn { 
            background: transparent;
            padding: 14px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn-create { color: var(--green-accent); border: 1px solid rgba(29, 185, 84, 0.3); }
        .btn-reset { color: var(--orange-accent); border: 1px solid rgba(245, 158, 11, 0.3); }

        .tool-btn:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h2>Bienvenido</h2>
            <p>Acceso al Panel Médico</p>
            
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            
            <button class="btn-login" onclick="iniciarSesion()">INGRESAR</button>
        </div>
        
        <div class="admin-tools">
            <button class="tool-btn btn-create" onclick="crearPrueba()">+ Crear Paciente</button>
            <button class="tool-btn btn-reset" onclick="resetearTodos()">Reiniciar Agenda</button>
        </div>
    </div>

</body>
</html>
