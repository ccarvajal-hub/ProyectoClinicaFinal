<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Médico - Panel de Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.iniciarSesion = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if (!email || !pass) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "doctor.html";
            } catch (error) { 
                alert("Error de acceso: Credenciales incorrectas."); 
            }
        };

        window.resetearTodos = async () => {
            if(!confirm("¿Deseas reiniciar todos los pacientes a 'pendiente'?")) return;
            try {
                const querySnapshot = await getDocs(collection(db, "agendados"));
                const promesas = [];
                querySnapshot.forEach((docSnap) => {
                    promesas.push(updateDoc(docSnap.ref, { estado: "pendiente" }));
                });
                await Promise.all(promesas);
                alert("¡Listo! Agenda reiniciada.");
            } catch (e) {
                alert("Error al resetear: " + e.message);
            }
        };
    </script>

    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4; 
            --orange-accent: #f59e0b;
            --input-bg: #2A2A2A;
            --input-border: #3E3E3E;
            --radius-box: 32px;
            --radius-input: 16px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            /* Aumentamos el ancho máximo del contenedor principal */
            max-width: 600px; 
        }

        .box { 
            background: var(--bg-card); 
            /* Aumentamos el padding para dar más "aire" */
            padding: 70px 60px; 
            border-radius: var(--radius-box); 
            width: 100%;
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        h2 { 
            /* Aumentamos ligeramente el tamaño del título */
            font-size: 2.8rem; 
            font-weight: 800; 
            margin: 0 0 10px 0; 
            letter-spacing: -2px;
        }

        p { 
            color: var(--text-muted); 
            font-size: 1.2rem; 
            /* Aumentamos el margen inferior para separar del contenido */
            margin-bottom: 50px; 
            margin-top: 0;
            font-weight: 400;
        }

        .input-group {
            width: 100%;
            /* Aumentamos la separación entre inputs */
            margin-bottom: 20px; 
        }

        input { 
            width: 100%; 
            /* Aumentamos el padding interno para inputs más altos */
            padding: 24px; 
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: var(--radius-input); 
            color: white;
            font-size: 1.2rem; 
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--blue-accent);
            background: #333;
            transform: translateY(-2px);
        }

        .btn-login { 
            background: var(--blue-accent); 
            color: white; 
            border: none; 
            /* Aumentamos el padding del botón */
            padding: 24px; 
            width: 100%; 
            cursor: pointer; 
            border-radius: var(--radius-input); 
            /* Aumentamos el margen superior */
            margin-top: 30px; 
            font-weight: 800;
            font-size: 1.2rem; 
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(70, 130, 180, 0.2);
        }

        .btn-login:hover { 
            opacity: 0.9; 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(70, 130, 180, 0.4);
        }

        .btn-login:active { transform: translateY(-1px); }

        .test-btn { 
            background: transparent;
            color: var(--orange-accent);
            border: 1px solid rgba(245, 158, 11, 0.2);
            padding: 16px 32px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.9rem; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            /* Aumentamos el margen superior para separar de la caja */
            margin-top: 50px; 
            transition: all 0.3s;
        }
        .test-btn:hover { 
            background: rgba(245, 158, 11, 0.05); 
            border-color: var(--orange-accent);
            color: #ffb84d;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            <h2>Bienvenido</h2>
            <p>Panel de Gestión Médica</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="Correo electrónico">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña">
            </div>
            
            <button class="btn-login" onclick="iniciarSesion()">INGRESAR AL PANEL</button>
        </div>
        
        <button class="test-btn" onclick="resetearTodos()">Reiniciar Agenda del Día</button>
    </div>

</body>
</html>
