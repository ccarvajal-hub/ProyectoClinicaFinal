<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Médicos - Agenda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #4a4a4a;
            --bg-card: #1c1c1c;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --blue-accent: #4682B4;
            --orange-accent: #f59e0b;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            flex-direction: column;
            padding: 24px;
        }

        .login-container {
            background-color: var(--bg-card);
            padding: 50px 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-muted);
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--blue-accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--blue-accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .dev-tools {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-dev {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            background: transparent;
            transition: 0.2s;
        }

        .btn-seed {
            border: 1px solid var(--blue-accent);
            color: var(--blue-accent);
        }

        .btn-seed:hover {
            background: var(--blue-accent);
            color: white;
        }

        .btn-reset {
            border: 1px solid var(--orange-accent);
            color: var(--orange-accent);
        }

        .btn-reset:hover {
            background: var(--orange-accent);
            color: white;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 36px 24px;
            }

            .dev-tools {
                flex-direction: column;
                width: 100%;
                max-width: 400px;
            }

            .btn-dev {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Bienvenido</h1>
        <p>Acceso al Panel Médico</p>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="doctor@clinica.cl">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" id="loginBtn">Iniciar Sesión</button>
        <div id="error-text" class="error-msg">Credenciales incorrectas</div>
    </div>

    <div class="dev-tools">
        <button class="btn-dev btn-seed" onclick="crearPacientesPrueba()">Crear Pacientes Test</button>
        <button class="btn-dev btn-reset" onclick="resetearEstados()">Reiniciar Jornada</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts",
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorText = document.getElementById("error-text");

            errorText.style.display = "none";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "doctor.html";
            } catch (e) {
                console.error("Error de login:", e);
                errorText.style.display = "block";
            }
        });

        document.getElementById("password").addEventListener("keydown", async (e) => {
            if (e.key === "Enter") {
                document.getElementById("loginBtn").click();
            }
        });

        document.getElementById("email").addEventListener("keydown", async (e) => {
            if (e.key === "Enter") {
                document.getElementById("loginBtn").click();
            }
        });

        window.crearPacientesPrueba = async () => {
            const pacientes = [
                {
                    nombre: "JUAN PEREZ",
                    rut: "12345678K",
                    hora_consulta: "09:00",
                    estado: "pendiente",
                    doctor_id: "doctor@clinica.cl",
                    consulta: "101",
                    piso: "Piso 1"
                },
                {
                    nombre: "MARIA GONZALEZ",
                    rut: "112223334",
                    hora_consulta: "09:30",
                    estado: "pendiente",
                    doctor_id: "doctor@clinica.cl",
                    consulta: "101",
                    piso: "Piso 1"
                },
                {
                    nombre: "RICARDO SOTO",
                    rut: "156667778",
                    hora_consulta: "10:00",
                    estado: "pendiente",
                    doctor_id: "doctor@clinica.cl",
                    consulta: "101",
                    piso: "Piso 1"
                }
            ];

            try {
                for (const p of pacientes) {
                    await addDoc(collection(db, "agendados"), p);
                }

                alert("Se han creado 3 pacientes de prueba para doctor@clinica.cl");
            } catch (e) {
                console.error("Error al crear pacientes de prueba:", e);
                alert("Error al crear pacientes de prueba.");
            }
        };

        window.resetearEstados = async () => {
            const confirmado = confirm("¿Reiniciar todos los pacientes a 'Pendiente' y limpiar datos de recepción/pago?");
            if (!confirmado) return;

            try {
                const snap = await getDocs(collection(db, "agendados"));

                for (const d of snap.docs) {
                    await updateDoc(doc(db, "agendados", d.id), {
                        estado: "pendiente",
                        hora_llegada: "",
                        hora_pago: "",
                        hora_llamado_recepcion: "",
                        hora_pago_manual_activado: "",
                        registro_manual_recepcion: false,
                        tipo_pago: null,
                        recepcion_id: null,
                        recepcion_numero: null,
                        recepcion_nombre: null
                    });
                }

                alert("Jornada reiniciada correctamente.");
            } catch (error) {
                console.error("Error al reiniciar jornada:", error);
                alert("Error al reiniciar jornada.");
            }
        };
    </script>
</body>
</html>
