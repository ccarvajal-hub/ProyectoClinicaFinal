<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Médico</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6sHSNXX9b3ky32Zt5_HYyDj7GiCWCbts", // <-- ¡No olvides poner tu llave aquí!
            authDomain: "llamado-cliente.firebaseapp.com",
            projectId: "llamado-cliente",
            storageBucket: "llamado-cliente.appspot.com",
            messagingSenderId: "444376711880",
            appId: "1:444376711880:web:01c32061eea040ef0f9bfd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Función normal de inicio de sesión
        window.iniciarSesion = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "doctor.html";
            } catch (error) { alert("Error: " + error.message); }
        };

        // Botón masivo para resetear a TODOS los pacientes a "pendiente"
        window.resetearTodos = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "agendados"));
                const promesas = [];
                
                // Recorremos todos los pacientes y preparamos la actualización
                querySnapshot.forEach((docSnap) => {
                    promesas.push(updateDoc(docSnap.ref, { estado: "pendiente" }));
                });
                
                // Ejecutamos todas las actualizaciones al mismo tiempo
                await Promise.all(promesas);
                alert("¡Listo! TODOS los pacientes volvieron a estar PENDIENTES.");
                
            } catch (e) {
                alert("Error al resetear: " + e.message);
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; margin: 0;}
        .box { background: #1e293b; padding: 40px; border-radius: 15px; width: 300px; text-align: center; margin-bottom: 20px;}
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box;}
        button { background: #3b82f6; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .test-btn { background: #f59e0b; width: 380px; padding: 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; color: white;}
    </style>
</head>
<body>
    <div class="box">
        <h2>Ingreso Médico</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="iniciarSesion()">INGRESAR</button>
    </div>
    
    <button class="test-btn" onclick="resetearTodos()">RESETEAR TODOS A "PENDIENTE"</button>
</body>
</html>
